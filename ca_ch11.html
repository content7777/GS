<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs Digest — SSC CGL</title>
<style>
  :root{
    --bg:#11161c;
    --bg-soft:#161d25;
    --surface:#1a222b;
    --surface-hi:#202a35;
    --line:#2a3541;
    --text:#e6e6e2;
    --text-dim:#9aa7b2;
    --text-faint:#69747e;
    --gold:#c9a86b;
    --gold-dim:#8a7550;
    --sage:#7fa99b;
    --sage-dim:#587065;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'URW Palladio L', P052, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1100px 700px at 85% -10%, rgba(127,169,155,0.06), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(201,168,107,0.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;}
  ::selection{background:rgba(201,168,107,0.25);}

  /* ---------- layout ---------- */
  .app{display:flex; min-height:100vh;}

  .sidebar{
    width:270px; flex-shrink:0;
    background:var(--bg-soft);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .brand{
    padding:26px 22px 18px 22px;
    border-bottom:1px solid var(--line);
  }
  .brand .kicker{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.14em;
    color:var(--sage); text-transform:uppercase;
  }
  .brand h1{
    font-family:var(--serif); font-weight:400; font-size:21px;
    margin-top:6px; line-height:1.25; color:var(--text);
  }
  .brand .sub{
    margin-top:6px; font-size:12px; color:var(--text-faint);
  }

  .nav{
    flex:1; overflow-y:auto; padding:14px 10px;
  }
  .nav::-webkit-scrollbar{width:6px;}
  .nav::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}

  .nav-item{
    display:flex; align-items:center; gap:12px;
    width:100%; text-align:left; background:none; border:none;
    color:var(--text-dim); font-family:var(--sans); font-size:13.5px;
    padding:10px 12px; border-radius:8px; cursor:pointer;
    transition:background .15s ease, color .15s ease;
    position:relative;
  }
  .nav-item:hover{background:var(--surface); color:var(--text);}
  .nav-item.active{background:var(--surface-hi); color:var(--gold);}
  .nav-item.active .num{color:var(--gold); border-color:var(--gold-dim);}
  .nav-item .num{
    font-family:var(--mono); font-size:10.5px; color:var(--text-faint);
    width:22px; height:22px; border:1px solid var(--line); border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .nav-item .lbl{flex:1;}
  .nav-item .cnt{
    font-family:var(--mono); font-size:10px; color:var(--text-faint);
    background:var(--bg); padding:2px 6px; border-radius:10px;
    border:1px solid var(--line);
  }
  .nav-item.active .cnt{color:var(--sage); border-color:var(--sage-dim);}

  .sidebar-foot{
    padding:16px 22px; border-top:1px solid var(--line);
    font-size:11px; color:var(--text-faint); line-height:1.6;
  }
  .sidebar-foot b{color:var(--sage); font-weight:600;}

  /* ---------- main ---------- */
  .main{flex:1; min-width:0;}
  .topbar{
    position:sticky; top:0; z-index:5;
    background:rgba(17,22,28,0.86); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:16px 40px; display:flex; align-items:center; justify-content:space-between; gap:20px;
  }
  .topbar .crumbs{font-family:var(--mono); font-size:11px; color:var(--text-faint); letter-spacing:.05em;}
  .topbar h2{font-family:var(--serif); font-weight:400; font-size:24px; margin-top:3px;}
  .filter-toggle{
    display:flex; align-items:center; gap:8px;
    font-size:12.5px; color:var(--text-dim); cursor:pointer;
    border:1px solid var(--line); padding:8px 14px; border-radius:999px;
    background:var(--surface); user-select:none; white-space:nowrap;
  }
  .filter-toggle.on{border-color:var(--gold-dim); color:var(--gold); background:rgba(201,168,107,0.08);}
  .filter-toggle .dot{width:7px; height:7px; border-radius:50%; background:var(--text-faint);}
  .filter-toggle.on .dot{background:var(--gold);}

  .content{padding:30px 40px 80px 40px; max-width:1180px;}
  .section-intro{
    color:var(--text-dim); font-size:14px; line-height:1.7; max-width:720px; margin-bottom:26px;
  }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:18px;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-left:3px solid var(--sage-dim);
    border-radius:10px;
    padding:18px 20px 16px 18px;
    display:flex; flex-direction:column; gap:10px;
  }
  .card.high{border-left-color:var(--gold);}
  .card-head{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .card h3{
    font-family:var(--serif); font-weight:400; font-size:16.5px; line-height:1.35; color:var(--text);
  }
  .badge{
    flex-shrink:0; font-family:var(--mono); font-size:10px; letter-spacing:.03em;
    padding:3px 8px; border-radius:999px; white-space:nowrap; margin-top:2px;
  }
  .badge.high{background:rgba(201,168,107,0.14); color:var(--gold); border:1px solid var(--gold-dim);}
  .badge.norm{background:rgba(127,169,155,0.10); color:var(--sage); border:1px solid var(--sage-dim);}

  .card ul{list-style:none; display:flex; flex-direction:column; gap:6px;}
  .card li{
    font-size:13px; line-height:1.55; color:var(--text-dim);
    padding-left:14px; position:relative;
  }
  .card li::before{
    content:"–"; position:absolute; left:0; color:var(--text-faint);
  }
  .card li b, .card li strong{color:var(--text); font-weight:600;}

  .home-hero{
    padding:6px 0 30px 0; border-bottom:1px solid var(--line); margin-bottom:30px;
  }
  .home-hero .kicker{font-family:var(--mono); font-size:11px; letter-spacing:.14em; color:var(--sage); text-transform:uppercase;}
  .home-hero h2{font-family:var(--serif); font-weight:400; font-size:34px; margin:10px 0 12px 0; max-width:640px; line-height:1.25;}
  .home-hero p{color:var(--text-dim); font-size:14.5px; max-width:600px; line-height:1.7;}

  .stat-row{display:flex; gap:14px; margin-top:24px; flex-wrap:wrap;}
  .stat{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:16px 22px; min-width:130px;
  }
  .stat .n{font-family:var(--serif); font-size:28px; color:var(--gold);}
  .stat .l{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; margin-top:4px;}

  .home-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px;
  }
  .home-card{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:18px 18px; cursor:pointer; transition:border-color .15s ease, transform .15s ease;
    display:flex; flex-direction:column; gap:8px;
  }
  .home-card:hover{border-color:var(--sage-dim); transform:translateY(-2px);}
  .home-card .hnum{font-family:var(--mono); font-size:11px; color:var(--text-faint);}
  .home-card .htitle{font-family:var(--serif); font-size:17px; color:var(--text);}
  .home-card .hmeta{font-size:11.5px; color:var(--text-faint);}
  .home-card .hmeta b{color:var(--gold);}

  .empty{
    color:var(--text-faint); font-size:13px; padding:40px 0; text-align:center;
  }

  @media (max-width:900px){
    .sidebar{position:fixed; left:0; top:0; height:100vh; transform:translateX(-100%); transition:transform .2s ease; z-index:20; box-shadow:20px 0 40px rgba(0,0,0,0.4);}
    .sidebar.open{transform:translateX(0);}
    .content, .topbar{padding-left:20px; padding-right:20px;}
    .menu-btn{display:flex !important;}
  }
  .menu-btn{
    display:none; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:8px; border:1px solid var(--line);
    background:var(--surface); color:var(--text); cursor:pointer; flex-shrink:0;
  }
  .overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:15;}
  .overlay.show{display:block;}
</style>
</head>

</div>

/* ---------------------------------------------------------
   STATE & RENDER
--------------------------------------------------------- */
let currentId = "home";
let highOnly = false;

const navEl = document.getElementById("nav");
const contentEl = document.getElementById("content");
const pageTitleEl = document.getElementById("pageTitle");
const crumbsEl = document.getElementById("crumbs");
const filterToggle = document.getElementById("filterToggle");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

function countHigh(sec){ return sec.items.filter(i=>i.p==="high").length; }
function totalItems(){ return sections.reduce((a,s)=>a+s.items.length,0); }
function totalHigh(){ return sections.reduce((a,s)=>a+countHigh(s),0); }

function buildNav(){
  navEl.innerHTML = "";
  const home = document.createElement("button");
  home.className = "nav-item" + (currentId==="home" ? " active":"");
  home.innerHTML = `<span class="num">◆</span><span class="lbl">Overview</span>`;
  home.onclick = ()=>{ currentId="home"; render(); };
  navEl.appendChild(home);

  sections.forEach(sec=>{
    const btn = document.createElement("button");
    btn.className = "nav-item" + (currentId===sec.id ? " active":"");
    btn.innerHTML = `<span class="num">${sec.num}</span><span class="lbl">${sec.title}</span><span class="cnt">${sec.items.length}</span>`;
    btn.onclick = ()=>{ currentId=sec.id; sidebar.classList.remove("open"); overlay.classList.remove("show"); render(); };
    navEl.appendChild(btn);
  });
}

function cardHtml(item){
  const highCls = item.p==="high" ? " high" : "";
  const badge = item.p==="high"
    ? `<span class="badge high">🔥 High Priority</span>`
    : `<span class="badge norm">Standard</span>`;
  const bullets = item.pts.map(p=>`<li>${p}</li>`).join("");
  return `<div class="card${highCls}">
      <div class="card-head"><h3>${item.t}</h3>${badge}</div>
      ${bullets ? `<ul>${bullets}</ul>` : ""}
    </div>`;
}

function renderHome(){
  crumbsEl.textContent = "OVERVIEW";
  pageTitleEl.textContent = "Overview";
  filterToggle.style.visibility = "hidden";
  const html = `
    <div class="home-hero">
      <div class="kicker">Study Companion</div>
      <h2>Everything the educator flagged as exam-worthy, organised the way he taught it.</h2>
      <p>Live-class chatter, jokes and off-topic talk have been stripped out. Each section below mirrors a segment of the lecture — walk through them in order, or jump straight to what you need.</p>
      <div class="stat-row">
        <div class="stat"><div class="n">${sections.length}</div><div class="l">Sections</div></div>
        <div class="stat"><div class="n">${totalItems()}</div><div class="l">Topics</div></div>
        <div class="stat"><div class="n">${totalHigh()}</div><div class="l">High Priority</div></div>
      </div>
    </div>
    <div class="home-grid">
      ${sections.map(s=>`
        <div class="home-card" data-id="${s.id}">
          <div class="hnum">${s.num}</div>
          <div class="htitle">${s.title}</div>
          <div class="hmeta">${s.items.length} topics · <b>${countHigh(s)} high priority</b></div>
        </div>`).join("")}
    </div>
  `;
  contentEl.innerHTML = html;
  contentEl.querySelectorAll(".home-card").forEach(c=>{
    c.onclick = ()=>{ currentId = c.dataset.id; render(); };
  });
}

function renderSection(sec){
  crumbsEl.textContent = `SECTION ${sec.num}`;
  pageTitleEl.textContent = sec.title;
  filterToggle.style.visibility = "visible";
  const items = highOnly ? sec.items.filter(i=>i.p==="high") : sec.items;
  const cards = items.map(cardHtml).join("");
  contentEl.innerHTML = `
    <div class="section-intro">${sec.intro}</div>
    <div class="grid">${cards || '<div class="empty">No high-priority items marked in this section — toggle the filter off to see everything.</div>'}</div>
  `;
}

function render(){
  buildNav();
  window.scrollTo(0,0);
  if(currentId==="home"){ renderHome(); return; }
  const sec = sections.find(s=>s.id===currentId);
  if(sec) renderSection(sec);
}

filterToggle.addEventListener("click", ()=>{
  highOnly = !highOnly;
  filterToggle.classList.toggle("on", highOnly);
  if(currentId!=="home") renderSection(sections.find(s=>s.id===currentId));
});

menuBtn.addEventListener("click", ()=>{
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
});
overlay.addEventListener("click", ()=>{
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
});

render();
</script>
