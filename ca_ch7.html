<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs — January 2025 | SSC CGL Revision</title>
<style>
  :root{
    --bg:#0f1117;
    --bg-alt:#12151d;
    --surface:#171c26;
    --surface-2:#1e2430;
    --border:#262d3d;
    --text:#eef1f6;
    --text-dim:#98a2b8;
    --text-dimmer:#6b7488;
    --green:#6ee7b7;
    --green-strong:#34d399;
    --blue:#7dd3fc;
    --blue-strong:#38bdf8;
    --amber:#fbbf24;
    --amber-dim:rgba(251,191,36,0.12);
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --radius: 14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(110,231,183,0.07), transparent 60%),
      radial-gradient(900px 500px at -5% 10%, rgba(125,211,252,0.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    display:flex;
    min-height:100vh;
  }
  ::selection{background:var(--green-strong); color:#04140d;}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#2a3142; border-radius:10px;}
  ::-webkit-scrollbar-thumb:hover{background:#374158;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:264px;
    flex-shrink:0;
    background:var(--bg-alt);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
    z-index:40;
  }
  .brand{
    padding:22px 20px 16px;
    border-bottom:1px solid var(--border);
  }
  .brand .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--green);
  }
  .brand h1{
    font-size:18px;
    font-weight:800;
    margin-top:6px;
    line-height:1.25;
    letter-spacing:-0.01em;
  }
  .brand h1 span{color:var(--blue);}
  .brand .sub{
    margin-top:6px;
    font-size:12px;
    color:var(--text-dim);
  }
  nav.navlist{
    flex:1;
    overflow-y:auto;
    padding:14px 10px;
  }
  .nav-group-label{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-dimmer);
    padding:10px 10px 6px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:transparent;
    border:1px solid transparent;
    color:var(--text-dim);
    font-size:13.5px;
    font-weight:600;
    padding:9px 10px;
    border-radius:10px;
    cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
    position:relative;
  }
  .nav-item .icon{font-size:15px; width:20px; text-align:center;}
  .nav-item .count{
    margin-left:auto;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-dimmer);
    background:var(--surface-2);
    padding:1px 6px;
    border-radius:20px;
  }
  .nav-item:hover{background:var(--surface); color:var(--text);}
  .nav-item.active{
    background:linear-gradient(90deg, rgba(110,231,183,0.10), rgba(125,211,252,0.06));
    border-color:#2b3d38;
    color:var(--text);
  }
  .nav-item.active::before{
    content:"";
    position:absolute; left:-10px; top:6px; bottom:6px; width:3px;
    background:linear-gradient(180deg, var(--green), var(--blue));
    border-radius:4px;
  }
  .nav-item.priority-nav.active::before{background:var(--amber);}
  .nav-item.priority-nav{color:var(--amber);}
  .nav-item.priority-nav .count{color:var(--amber); background:var(--amber-dim);}

  .sidebar-footer{
    padding:14px 18px 18px;
    border-top:1px solid var(--border);
    font-size:11px;
    color:var(--text-dimmer);
    font-family:var(--mono);
    line-height:1.6;
  }

  /* ---------- MAIN ---------- */
  .main{
    flex:1;
    min-width:0;
    height:100vh;
    overflow-y:auto;
  }
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:14px;
    padding:16px 28px;
    background:rgba(15,17,23,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .hamburger{
    display:none;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); width:36px; height:36px; border-radius:9px;
    font-size:16px; cursor:pointer;
    align-items:center; justify-content:center;
  }
  .topbar h2{
    font-size:16px; font-weight:800; letter-spacing:-0.01em;
    display:flex; align-items:center; gap:8px;
  }
  .search-wrap{
    margin-left:auto;
    display:flex; align-items:center; gap:10px;
  }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:7px 12px;
    min-width:220px;
  }
  .search-box input{
    background:transparent; border:none; outline:none;
    color:var(--text); font-size:13px; width:100%;
    font-family:var(--sans);
  }
  .search-box input::placeholder{color:var(--text-dimmer);}
  .toggle-pill{
    display:flex; align-items:center; gap:7px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:999px; padding:6px 12px;
    font-size:12px; font-weight:600; color:var(--text-dim);
    cursor:pointer; user-select:none;
    white-space:nowrap;
  }
  .toggle-pill .dot{
    width:9px; height:9px; border-radius:50%;
    background:#3a4256; transition:background .15s;
  }
  .toggle-pill.on{ color:var(--amber); border-color:#4a3c1c; background:var(--amber-dim);}
  .toggle-pill.on .dot{background:var(--amber);}

  .content{
    padding:28px 32px 80px;
    max-width:1180px;
  }

  /* ---------- HOME ---------- */
  .hero{
    padding:36px 0 8px;
  }
  .hero .eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--blue);
  }
  .hero h1{
    font-size:38px; font-weight:800; letter-spacing:-0.02em;
    margin-top:10px; line-height:1.15;
  }
  .hero h1 .grad{
    background:linear-gradient(90deg, var(--green), var(--blue));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero p{
    margin-top:14px; color:var(--text-dim); font-size:15px; max-width:640px; line-height:1.6;
  }
  .stat-row{
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
    margin:30px 0 12px;
  }
  .stat-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 18px;
  }
  .stat-card .num{
    font-size:28px; font-weight:800; letter-spacing:-0.02em;
    background:linear-gradient(90deg, var(--green), var(--blue));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .stat-card.amber .num{background:none; -webkit-background-clip:unset; color:var(--amber);}
  .stat-card .label{
    margin-top:4px; font-size:12px; color:var(--text-dim); font-family:var(--mono);
    text-transform:uppercase; letter-spacing:0.06em;
  }

  .revision-cta{
    margin:26px 0 34px;
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    background:linear-gradient(120deg, rgba(251,191,36,0.10), rgba(251,191,36,0.02));
    border:1px solid #4a3c1c; border-radius:var(--radius);
    padding:20px 24px;
    cursor:pointer;
    transition:transform .15s, border-color .15s;
  }
  .revision-cta:hover{transform:translateY(-1px); border-color:#6b5525;}
  .revision-cta .rtxt h3{font-size:16px; font-weight:800; color:var(--amber); display:flex; gap:8px; align-items:center;}
  .revision-cta .rtxt p{margin-top:6px; font-size:13px; color:var(--text-dim); max-width:520px;}
  .revision-cta .arrow{font-size:22px; color:var(--amber);}

  .section-grid-label{
    font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--text-dimmer); margin:8px 0 14px;
  }
  .quick-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:14px;
  }
  .quick-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; cursor:pointer; transition:transform .15s, border-color .15s, background .15s;
    display:flex; flex-direction:column; gap:8px;
  }
  .quick-card:hover{transform:translateY(-2px); border-color:#37405a; background:var(--surface-2);}
  .quick-card .qicon{font-size:22px;}
  .quick-card .qname{font-size:14.5px; font-weight:700;}
  .quick-card .qmeta{font-size:11.5px; color:var(--text-dimmer); font-family:var(--mono);}

  /* ---------- SECTION HEADER ---------- */
  .section-header{
    padding:8px 0 6px;
  }
  .section-header .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--green);
  }
  .section-header h1{
    font-size:28px; font-weight:800; letter-spacing:-0.01em; margin-top:6px;
    display:flex; align-items:center; gap:10px;
  }
  .section-header .meta{
    margin-top:8px; font-size:13px; color:var(--text-dim);
  }

  /* ---------- CARDS ---------- */
  .card-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px;
    margin-top:22px;
  }
  .acard{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:3px solid #2c3346;
    border-radius:var(--radius);
    padding:18px 18px 16px;
    display:flex; flex-direction:column; gap:10px;
    transition:transform .15s, border-color .15s;
  }
  .acard:hover{transform:translateY(-2px); border-color:#3a4258;}
  .acard.priority{
    border-left-color:var(--amber);
    background:linear-gradient(160deg, rgba(251,191,36,0.05), var(--surface) 40%);
  }
  .acard .ctitle{
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  }
  .acard .ctitle h3{
    font-size:15.5px; font-weight:700; line-height:1.35; letter-spacing:-0.01em;
  }
  .badge{
    flex-shrink:0;
    font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.02em;
    color:#241a02; background:var(--amber);
    padding:3px 8px; border-radius:999px; white-space:nowrap;
  }
  .csec-tag{
    display:inline-block; align-self:flex-start;
    font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--blue); background:rgba(125,211,252,0.08); border:1px solid rgba(125,211,252,0.2);
    padding:2px 8px; border-radius:6px; margin-bottom:2px;
  }
  .acard ul{
    list-style:none; display:flex; flex-direction:column; gap:7px;
  }
  .acard ul li{
    font-size:13.3px; line-height:1.55; color:#d3d9e6;
    padding-left:16px; position:relative;
  }
  .acard ul li::before{
    content:"▸"; position:absolute; left:0; top:0;
    color:var(--green);
    font-size:12px;
  }
  .acard.priority ul li::before{color:var(--amber);}
  .acard ul li b, .acard ul li strong{color:var(--text); font-weight:700;}

  .pairs{
    display:flex; flex-direction:column; gap:0;
  }
  .pair-row{
    display:flex; justify-content:space-between; gap:14px;
    padding:8px 0; border-bottom:1px dashed var(--border);
    font-size:13px;
  }
  .pair-row:last-child{border-bottom:none;}
  .pair-row .k{color:var(--text); font-weight:600;}
  .pair-row .v{color:var(--text-dim); text-align:right;}

  .empty-state{
    margin-top:60px; text-align:center; color:var(--text-dimmer);
    font-size:14px;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:900px){
    .sidebar{
      position:fixed; left:0; top:0; bottom:0;
      transform:translateX(-100%);
      transition:transform .2s ease;
      box-shadow:20px 0 40px rgba(0,0,0,0.4);
    }
    .sidebar.open{transform:translateX(0);}
    .hamburger{display:flex;}
    .content{padding:22px 16px 70px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .hero h1{font-size:28px;}
    .search-box{min-width:140px;}
    .topbar{padding:14px 16px;}
    .topbar h2{font-size:14px;}
  }
  .overlay{
    display:none;
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:35;
  }
  .overlay.show{display:block;}
</style>
</head>

/* =========================================================
   STATE
   ========================================================= */
let state = { view:'home', search:'', priorityOnly:false };

function allCards(){
  const out=[];
  SECTIONS.forEach(sec=>{
    sec.cards.forEach(c=>out.push({...c, _section:sec}));
  });
  return out;
}
function totalCount(){ return allCards().length; }
function priorityCount(){ return allCards().filter(c=>c.priority).length; }

/* =========================================================
   SIDEBAR
   ========================================================= */
function renderSidebar(){
  const nav=document.getElementById('navlist');
  let html = `<div class="nav-group-label">Overview</div>`;
  html += navItemHTML('home','Home','🏠', totalCount(), state.view==='home');
  html += navItemHTML('priority','Priority Revision','🔥', priorityCount(), state.view==='priority', true);
  html += `<div class="nav-group-label">Subjects</div>`;
  SECTIONS.forEach(sec=>{
    html += navItemHTML(sec.id, sec.name, sec.icon, sec.cards.length, state.view===sec.id);
  });
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.view = btn.dataset.id;
      state.search='';
      document.getElementById('searchInput').value='';
      closeSidebarMobile();
      render();
    });
  });
}
function navItemHTML(id,name,icon,count,active,isPriority){
  return `<button class="nav-item ${active?'active':''} ${isPriority?'priority-nav':''}" data-id="${id}">
    <span class="icon">${icon}</span><span>${name}</span><span class="count">${count}</span>
  </button>`;
}

/* =========================================================
   RENDER: HOME
   ========================================================= */
function renderHome(){
  document.getElementById('topbarTitle').textContent = 'Home';
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="hero">
      <div class="eyebrow">Live Class → Exam-Ready Notes</div>
      <h1>January 2025 <span class="grad">Current Affairs</span><br>for SSC CGL</h1>
      <p>Every fact below is exactly what the educator flagged as worth remembering — jokes, live-chat replies, and off-topic chatter have been stripped out. Items marked 🔥 were explicitly called "important" or noted as previously asked in an exam.</p>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="num">${SECTIONS.length}</div><div class="label">Subjects</div></div>
      <div class="stat-card"><div class="num">${totalCount()}</div><div class="label">Topics Covered</div></div>
      <div class="stat-card amber"><div class="num">${priorityCount()}</div><div class="label">🔥 High Priority</div></div>
      <div class="stat-card"><div class="num">Jan '25</div><div class="label">Coverage Period</div></div>
    </div>
    <div class="revision-cta" id="revisionCta">
      <div class="rtxt">
        <h3>🔥 Priority Revision Mode</h3>
        <p>Jump straight to every fact the educator personally flagged as important — ideal for a last-minute run-through before the exam.</p>
      </div>
      <div class="arrow">→</div>
    </div>
    <div class="section-grid-label">Browse by Subject</div>
    <div class="quick-grid" id="quickGrid"></div>
  `;
  document.getElementById('revisionCta').addEventListener('click', ()=>{
    state.view='priority'; renderSidebar(); render();
  });
  const grid = document.getElementById('quickGrid');
  grid.innerHTML = SECTIONS.map(sec=>{
    const pCount = sec.cards.filter(c=>c.priority).length;
    return `<div class="quick-card" data-id="${sec.id}">
      <div class="qicon">${sec.icon}</div>
      <div class="qname">${sec.name}</div>
      <div class="qmeta">${sec.cards.length} topics${pCount? ' · 🔥 '+pCount:''}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.quick-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.view = el.dataset.id;
      renderSidebar(); render();
    });
  });
}

/* =========================================================
   RENDER: CARD
   ========================================================= */
function cardHTML(card, showSectionTag){
  const isPriority = !!card.priority;
  let inner = '';
  if(card.type==='pairs'){
    inner = `<div class="pairs">${card.pairs.map(p=>`<div class="pair-row"><span class="k">${p[0]}</span><span class="v">${p[1]}</span></div>`).join('')}</div>`;
  } else {
    inner = `<ul>${card.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
  }
  return `<div class="acard ${isPriority?'priority':''}">
    ${showSectionTag ? `<span class="csec-tag">${card._section.icon} ${card._section.name}</span>` : ''}
    <div class="ctitle">
      <h3>${card.title}</h3>
      ${isPriority ? `<span class="badge">🔥 HIGH PRIORITY</span>` : ''}
    </div>
    ${inner}
  </div>`;
}

/* =========================================================
   RENDER: SECTION / PRIORITY
   ========================================================= */
function matchesSearch(card, term){
  if(!term) return true;
  const hay = (card.title + ' ' + (card.bullets? card.bullets.join(' ') : card.pairs.map(p=>p.join(' ')).join(' '))).toLowerCase();
  return hay.includes(term.toLowerCase());
}

function renderSection(sec){
  document.getElementById('topbarTitle').innerHTML = `${sec.icon} ${sec.name}`;
  let cards = sec.cards.slice();
  if(state.priorityOnly) cards = cards.filter(c=>c.priority);
  if(state.search) cards = cards.filter(c=>matchesSearch(c,state.search));

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="section-header">
      <div class="eyebrow">Subject</div>
      <h1>${sec.icon} ${sec.name}</h1>
      <div class="meta">${sec.cards.length} topic${sec.cards.length!==1?'s':''} · ${sec.cards.filter(x=>x.priority).length} flagged high priority</div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  `;
  const grid = document.getElementById('cardGrid');
  if(cards.length===0){
    grid.outerHTML = `<div class="empty-state">No topics match your current filters.</div>`;
  } else {
    grid.innerHTML = cards.map(card=>cardHTML(card,false)).join('');
  }
}

function renderPriority(){
  document.getElementById('topbarTitle').innerHTML = `🔥 Priority Revision`;
  let cards = allCards().filter(c=>c.priority);
  if(state.search) cards = cards.filter(c=>matchesSearch(c,state.search));

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="section-header">
      <div class="eyebrow">Last-Minute Run-Through</div>
      <h1>🔥 Priority Revision</h1>
      <div class="meta">${cards.length} of ${priorityCount()} flagged topics shown — everything the educator explicitly called out as important.</div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  `;
  const grid = document.getElementById('cardGrid');
  if(cards.length===0){
    grid.outerHTML = `<div class="empty-state">No topics match your search.</div>`;
  } else {
    grid.innerHTML = cards.map(card=>cardHTML(card,true)).join('');
  }
}

/* =========================================================
   MASTER RENDER
   ========================================================= */
function render(){
  if(state.view==='home'){ renderHome(); }
  else if(state.view==='priority'){ renderPriority(); }
  else {
    const sec = SECTIONS.find(s=>s.id===state.view);
    if(sec) renderSection(sec); else renderHome();
  }
  renderSidebar();
}

/* =========================================================
   EVENTS
   ========================================================= */
document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.search = e.target.value;
  if(state.view==='home'){ /* search inactive on home */ return; }
  if(state.view==='priority'){ renderPriority(); }
  else{
    const sec = SECTIONS.find(s=>s.id===state.view);
    if(sec) renderSection(sec);
  }
});

document.getElementById('priorityToggle').addEventListener('click', function(){
  state.priorityOnly = !state.priorityOnly;
  this.classList.toggle('on', state.priorityOnly);
  if(state.view!=='home' && state.view!=='priority'){
    const sec = SECTIONS.find(s=>s.id===state.view);
    if(sec) renderSection(sec);
  }
});

const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('hamburger').addEventListener('click', ()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', closeSidebarMobile);
function closeSidebarMobile(){
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

/* =========================================================
   INIT
   ========================================================= */
render();
</script>
