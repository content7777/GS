<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproduction | Bio Revision Vault</title>
<style>
:root{
  --bg:#0f1117;
  --panel:#161922;
  --panel-2:#1c2030;
  --line:#262b3a;
  --text:#e7e9f0;
  --text-dim:#9aa1b4;
  --green:#7ee2a8;
  --green-dim:#3f6e57;
  --blue:#7ec8e3;
  --blue-dim:#3a5e6e;
  --amber:#e8b86d;
  --red:#e88c8c;
  --purple:#c3a6e8;
  --radius:14px;
  --serif: "Source Serif Pro", Georgia, "Times New Roman", serif;
  --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  height:100vh;
}

/* ---------- Layout shell ---------- */
.app{
  display:flex;
  height:100vh;
  width:100vw;
}

/* ---------- Sidebar ---------- */
.sidebar{
  width:300px;
  min-width:300px;
  background:linear-gradient(180deg,#12141c,#0f1117);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  height:100vh;
  transition:transform .3s ease;
  z-index:50;
}
.brand{
  padding:22px 22px 16px;
  border-bottom:1px solid var(--line);
}
.brand .tag{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.14em;
  color:var(--green);
  text-transform:uppercase;
}
.brand h1{
  font-family:var(--serif);
  font-size:22px;
  margin:6px 0 2px;
  font-weight:600;
  color:var(--text);
  letter-spacing:.01em;
}
.brand p{
  font-size:12.5px;
  color:var(--text-dim);
  margin:0;
}

.nav-scroll{
  flex:1;
  overflow-y:auto;
  padding:14px 12px 18px;
}
.nav-scroll::-webkit-scrollbar{width:6px;}
.nav-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

.nav-group{margin-bottom:6px;}
.nav-group-label{
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--text-dim);
  padding:14px 12px 6px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 12px;
  border-radius:9px;
  cursor:pointer;
  font-size:13.5px;
  color:var(--text-dim);
  transition:background .15s, color .15s;
  user-select:none;
}
.nav-item:hover{background:var(--panel-2);color:var(--text);}
.nav-item.active{
  background:rgba(126,226,168,.1);
  color:var(--green);
  font-weight:600;
}
.nav-item .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--line);
  flex-shrink:0;
}
.nav-item.active .dot{background:var(--green);}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}

.sidebar-foot{
  padding:14px 18px;
  border-top:1px solid var(--line);
  font-size:11px;
  color:var(--text-dim);
  font-family:var(--mono);
}
.progress-wrap{margin-bottom:10px;}
.progress-bar-track{
  height:6px;background:var(--panel-2);border-radius:4px;overflow:hidden;margin-top:6px;
}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--green),var(--blue));
  width:0%;transition:width .4s ease;
}

/* ---------- Main content ---------- */
.main{
  flex:1;
  height:100vh;
  overflow-y:auto;
  position:relative;
}
.main::-webkit-scrollbar{width:9px;}
.main::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;}

.topbar{
  position:sticky;top:0;z-index:30;
  background:rgba(15,17,23,.88);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:14px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.menu-btn{
  display:none;
  background:var(--panel-2);
  border:1px solid var(--line);
  color:var(--text);
  width:38px;height:38px;
  border-radius:9px;
  font-size:16px;
  cursor:pointer;
  align-items:center;justify-content:center;
}
.topbar-title{
  font-family:var(--mono);
  font-size:12px;
  color:var(--text-dim);
  letter-spacing:.06em;
}
.topbar-title b{color:var(--green);font-weight:600;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.mark-done-btn{
  background:var(--panel-2);
  border:1px solid var(--line);
  color:var(--text-dim);
  padding:8px 14px;
  border-radius:8px;
  font-size:12.5px;
  cursor:pointer;
  font-family:var(--sans);
  transition:.15s;
  white-space:nowrap;
}
.mark-done-btn.done{
  background:rgba(126,226,168,.12);
  border-color:var(--green-dim);
  color:var(--green);
}

.page{
  padding:34px 40px 100px;
  max-width:980px;
  margin:0 auto;
  display:none;
  animation:fadeIn .35s ease;
}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Typography blocks ---------- */
.eyebrow{
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--blue);
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.page h1.page-title{
  font-family:var(--serif);
  font-size:34px;
  font-weight:600;
  margin:0 0 8px;
  color:var(--text);
}
.page-sub{
  color:var(--text-dim);
  font-size:15px;
  margin:0 0 30px;
  max-width:680px;
}

h2.section-h{
  font-family:var(--serif);
  font-size:21px;
  color:var(--green);
  margin:38px 0 14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
h3.sub-h{
  font-family:var(--sans);
  font-size:15.5px;
  font-weight:700;
  color:var(--blue);
  margin:22px 0 10px;
}
p{color:var(--text);font-size:14.8px;}
.dim{color:var(--text-dim);}

/* ---------- Cards & components ---------- */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px 22px;
  margin:14px 0;
}
.card.green{border-color:var(--green-dim);background:rgba(126,226,168,.05);}
.card.blue{border-color:var(--blue-dim);background:rgba(126,200,227,.05);}
.card.amber{border-color:#6e5a37;background:rgba(232,184,109,.06);}
.card.red{border-color:#6e3a3a;background:rgba(232,140,140,.06);}
.card.purple{border-color:#5a4a70;background:rgba(195,166,232,.06);}

.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.tag{
  font-family:var(--mono);
  font-size:10.5px;
  padding:3px 9px;
  border-radius:20px;
  font-weight:600;
  letter-spacing:.03em;
}
.tag.must{background:rgba(232,140,140,.16);color:var(--red);}
.tag.imp{background:rgba(232,184,109,.16);color:var(--amber);}
.tag.good{background:rgba(126,200,227,.16);color:var(--blue);}

.hook-box{
  display:flex;gap:14px;
  background:var(--panel-2);
  border-left:3px solid var(--purple);
  border-radius:0 10px 10px 0;
  padding:14px 18px;
  margin:12px 0;
}
.hook-box .emoji{font-size:22px;line-height:1;flex-shrink:0;}
.hook-box b{color:var(--purple);}

.trap-box{
  background:rgba(232,140,140,.07);
  border:1px solid #5a3838;
  border-radius:10px;
  padding:14px 18px;
  margin:12px 0;
}
.trap-box .trap-title{color:var(--red);font-weight:700;font-size:13.5px;margin-bottom:6px;display:flex;gap:6px;align-items:center;}

table{
  width:100%;
  border-collapse:collapse;
  margin:14px 0;
  font-size:13.8px;
}
th{
  background:var(--panel-2);
  color:var(--blue);
  text-align:left;
  padding:10px 14px;
  font-family:var(--mono);
  font-size:11.5px;
  letter-spacing:.04em;
  text-transform:uppercase;
  border-bottom:1px solid var(--line);
}
td{
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  color:var(--text);
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

ul,ol{padding-left:22px;margin:10px 0;}
li{margin-bottom:7px;font-size:14.6px;}
li::marker{color:var(--green);}

.flow{
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;
  margin:16px 0;
}
.flow-step{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:9px;
  padding:9px 15px;
  font-size:13.5px;
  font-weight:600;
}
.flow-arrow{color:var(--green);font-size:16px;}

/* Memory palace */
.palace-map{
  background:radial-gradient(circle at 30% 20%, rgba(126,226,168,.07), transparent 60%),
              radial-gradient(circle at 80% 70%, rgba(126,200,227,.07), transparent 55%),
              var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:26px;
  margin:18px 0 26px;
}
.palace-station{
  display:flex;gap:16px;
  padding:14px 0;
  border-bottom:1px dashed var(--line);
}
.palace-station:last-child{border-bottom:none;}
.station-num{
  font-family:var(--serif);
  font-size:26px;
  color:var(--green);
  opacity:.5;
  width:38px;
  flex-shrink:0;
}
.station-body b{color:var(--blue);}

/* Flashcards / Active recall */
.flashcard{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:16px 18px;
  margin:10px 0;
  cursor:pointer;
  position:relative;
  transition:border-color .2s;
}
.flashcard:hover{border-color:var(--blue-dim);}
.flashcard .q{font-weight:600;color:var(--text);font-size:14.3px;}
.flashcard .a{
  color:var(--green);
  font-size:13.8px;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--line);
  display:none;
}
.flashcard.open .a{display:block;}
.flashcard .hint{
  font-family:var(--mono);
  font-size:10px;
  color:var(--text-dim);
  margin-top:8px;
  letter-spacing:.05em;
}

.blank{
  display:inline-block;
  min-width:70px;
  border-bottom:2px dotted var(--blue);
  text-align:center;
  color:transparent;
  user-select:none;
}
.blank.revealed{color:var(--green);font-weight:700;border-bottom-style:solid;}

/* ultra fast / 30 sec sheets */
.rapid-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin:16px 0;
}
.rapid-card{
  background:var(--panel-2);
  border-radius:10px;
  padding:14px 16px;
  border:1px solid var(--line);
}
.rapid-card h4{
  margin:0 0 6px;
  font-size:12.5px;
  color:var(--amber);
  font-family:var(--mono);
  letter-spacing:.04em;
}
.rapid-card p{margin:0;font-size:13.5px;color:var(--text);}

.last-night{
  background:linear-gradient(160deg, rgba(126,226,168,.08), rgba(126,200,227,.05));
  border:1px solid var(--green-dim);
  border-radius:16px;
  padding:24px 26px;
}
.last-night h3{color:var(--green);margin-top:0;}
.last-night ul{margin:8px 0;}

.divider-note{
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-dim);
  text-align:center;
  margin:30px 0 14px;
  letter-spacing:.1em;
}
.divider-note::before,.divider-note::after{content:"— — —";opacity:.3;margin:0 12px;}

.page-nav-footer{
  display:flex;justify-content:space-between;
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid var(--line);
}
.nav-footer-btn{
  background:var(--panel-2);
  border:1px solid var(--line);
  color:var(--text);
  padding:10px 18px;
  border-radius:9px;
  cursor:pointer;
  font-size:13px;
  font-family:var(--sans);
}
.nav-footer-btn:hover{border-color:var(--green-dim);color:var(--green);}

/* overlay for mobile */
.overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:40;
}
.overlay.show{display:block;}

@media(max-width:880px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:flex;}
  .page{padding:24px 18px 80px;}
  .page h1.page-title{font-size:26px;}
}
</style>
</head>
<body>

<div class="app">
  <div class="overlay" id="overlay"></div>

  <!-- ================= SIDEBAR ================= -->
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="tag">SSC CGL · Biology</div>
      <h1>Reproduction</h1>
      <p>High-Retention Revision Vault</p>
    </div>
    <div class="nav-scroll" id="navScroll">
      <!-- populated by JS -->
    </div>
    <div class="sidebar-foot">
      <div class="progress-wrap">
        <div style="display:flex;justify-content:space-between;">
          <span>REVISION PROGRESS</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      </div>
      <div>Reset count this session: <span id="resetCount" style="color:var(--green)">0</span></div>
    </div>
  </nav>

  <!-- ================= MAIN ================= -->
  <main class="main" id="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title">Chapter: <b>Reproduction</b> <span id="topbarPage" class="dim"></span></div>
      <div class="topbar-actions">
        <button class="mark-done-btn" id="markDoneBtn">✓ Mark page revised</button>
      </div>
    </div>

    <div id="pages"><!-- pages injected by JS --></div>
  </main>
</div>

<script>
/* ===========================================================
   PAGE DEFINITIONS
   Each page: id, navIcon, navLabel, group, html content
=========================================================== */
const pages = [
  { id:"big-picture", icon:"🧬", label:"Big Picture", group:"OVERVIEW" },
  { id:"memory-palace", icon:"🏰", label:"Memory Palace", group:"OVERVIEW" },

  { id:"asexual-intro", icon:"①", label:"Asexual: Intro & Types", group:"ASEXUAL REPRODUCTION" },
  { id:"binary-multiple", icon:"②", label:"Binary & Multiple Fission", group:"ASEXUAL REPRODUCTION" },
  { id:"fragment-budding-regen", icon:"③", label:"Fragmentation, Budding, Regeneration", group:"ASEXUAL REPRODUCTION" },
  { id:"spore-veg-prop", icon:"④", label:"Spore Formation & Vegetative Propagation", group:"ASEXUAL REPRODUCTION" },
  { id:"tissue-parthenogenesis", icon:"⑤", label:"Tissue Culture & Parthenogenesis", group:"ASEXUAL REPRODUCTION" },

  { id:"human-male", icon:"♂", label:"Human Male Reproductive System", group:"SEXUAL REPRODUCTION — HUMANS" },
  { id:"human-female", icon:"♀", label:"Human Female Reproductive System", group:"SEXUAL REPRODUCTION — HUMANS" },
  { id:"fertilization-dev", icon:"🌱", label:"Fertilization, Gestation & Placenta", group:"SEXUAL REPRODUCTION — HUMANS" },
  { id:"ivf", icon:"🧪", label:"IVF (Test Tube Baby)", group:"SEXUAL REPRODUCTION — HUMANS" },

  { id:"plant-flower-parts", icon:"🌸", label:"Flower Parts: Stamen & Pistil", group:"SEXUAL REPRODUCTION — PLANTS" },
  { id:"pollination", icon:"🐝", label:"Pollination Types", group:"SEXUAL REPRODUCTION — PLANTS" },
  { id:"fertilization-plant", icon:"🍎", label:"Fertilization → Fruit & Seed", group:"SEXUAL REPRODUCTION — PLANTS" },
  { id:"flower-classification", icon:"🌼", label:"Bisexual/Unisexual, Monoecious/Dioecious", group:"SEXUAL REPRODUCTION — PLANTS" },

  { id:"exam-traps", icon:"⚠", label:"Exam Traps (All)", group:"REVISION LAYERS" },
  { id:"examiner-questions", icon:"🎯", label:"Examiner's Favourite Questions", group:"REVISION LAYERS" },
  { id:"active-recall", icon:"❓", label:"Active Recall Zone", group:"REVISION LAYERS" },
  { id:"high-yield", icon:"⭐", label:"High-Yield Revision Notes", group:"REVISION LAYERS" },
  { id:"ultra-fast", icon:"⚡", label:"Ultra-Fast Revision Sheet", group:"REVISION LAYERS" },
  { id:"thirty-sec", icon:"⏱", label:"30-Second Sheet", group:"REVISION LAYERS" },
  { id:"last-night", icon:"🌙", label:"Last Night Before Exam", group:"REVISION LAYERS" },
];

/* ===========================================================
   PAGE CONTENT (HTML strings)
=========================================================== */
const content = {};

content["big-picture"] = `
  <div class="eyebrow">🧬 Orientation</div>
  <h1 class="page-title">The Big Picture</h1>
  <p class="page-sub">What this entire chapter is really about, in one breath — before you drown in details.</p>

  <div class="card green">
    <p><b>Reproduction = the production of new offspring.</b> Biology splits this into exactly two strategies, and every fact in this chapter is a child of one of these two parents:</p>
    <div class="flow">
      <div class="flow-step" style="border-color:var(--amber);color:var(--amber);">ASEXUAL<br><span style="font-size:11px;color:var(--text-dim);">1 parent, no gametes, no zygote</span></div>
      <div class="flow-arrow">vs</div>
      <div class="flow-step" style="border-color:var(--blue);color:var(--blue);">SEXUAL<br><span style="font-size:11px;color:var(--text-dim);">2 parents, gametes fuse → zygote</span></div>
    </div>
  </div>

  <h2 class="section-h">🔑 The One Idea That Unlocks Everything</h2>
  <div class="hook-box">
    <div class="emoji">👤</div>
    <div><b>One parent = one source of traits = high genetic similarity (clone-like).</b><br>
    <b>Two parents = two sources of traits = high genetic diversity.</b><br>
    This single idea answers almost every "which has more diversity/similarity" question in this chapter.</div>
  </div>

  <h2 class="section-h">🗺️ The Territory Map</h2>
  <table>
    <tr><th>Branch</th><th>Where it shows up</th><th>Key mechanism</th></tr>
    <tr><td>Asexual</td><td>Amoeba, Plasmodium, algae, Hydra, Planaria, Rhizopus, plants</td><td>Fission, budding, regeneration, fragmentation, spores, vegetative propagation, parthenogenesis</td></tr>
    <tr><td>Sexual — Humans</td><td>Male & female reproductive systems</td><td>Sperm + ovum → zygote → fetus, via fertilization in fallopian tube</td></tr>
    <tr><td>Sexual — Plants</td><td>Flower anatomy</td><td>Stamen (male) + Pistil (female), via pollination → fertilization → fruit/seed</td></tr>
  </table>

  <h2 class="section-h">🔥 Why This Chapter Is High-Yield for SSC CGL</h2>
  <ul>
    <li><b>Direct one-liners:</b> "Disease X caused by which organism reproducing by Y fission" type questions are extremely common.</li>
    <li><b>Match-the-following gold mine:</b> Organism ↔ type of asexual reproduction is asked almost every year in some form.</li>
    <li><b>Cross-topic links:</b> This chapter quietly tests Diseases (Malaria, Kala-azar, Cervical cancer) and Botany (algae types) at the same time.</li>
  </ul>

  <div class="trap-box">
    <div class="trap-title">⚠ The #1 Mindset Trap</div>
    <p>Students treat "asexual" as one simple idea and rush through it, then lose marks on the 7 different TYPES of asexual reproduction because they all blur together. This chapter rewards people who can instantly tell binary fission apart from multiple fission apart from budding apart from fragmentation. That distinction is drilled hard in the next pages.</p>
  </div>
`;

content["memory-palace"] = `
  <div class="eyebrow">🏰 Retention Framework</div>
  <h1 class="page-title">The Reproduction Memory Palace</h1>
  <p class="page-sub">Walk through this mentally during the exam. One building, one journey — every concept has an address.</p>

  <div class="palace-map">
    <h3 class="sub-h" style="margin-top:0;">🏛️ THE PALACE: "The Twin-Wing Biology Museum"</h3>
    <p class="dim">Picture a museum with two wings joined by a central hall. The <b>Left Wing</b> is dim, quiet, and full of single mysterious creatures cloning themselves in glass tanks (Asexual Wing). The <b>Right Wing</b> is bright, has a wedding hall energy — couples, flowers, nurseries (Sexual Wing). You always enter through the Central Hall first.</p>

    <div class="palace-station">
      <div class="station-num">0</div>
      <div class="station-body"><b>Central Hall — The Fork in the Floor</b><br>
      A glowing floor sign splits into two paths: 👤 "ONE PARENT →" (left) and 👫 "TWO PARENTS →" (right). This is the gametes/zygote checkpoint — if you see gametes fusing, you're going right.</div>
    </div>

    <div class="palace-station">
      <div class="station-num">1</div>
      <div class="station-body"><b>Left Wing, Tank 1 — The Amoeba Splitting Blob</b><br>
      A shapeless blob in a tank slowly stretches and SNAPS into two identical blobs along any random line. Label: <b>Binary Fission</b> (Amoeba, bacteria, Paramecium, Leishmania). Notice Leishmania's tank has only ONE groove marked on the glass — it can only snap along that one line (kala-azar's signature).</div>
    </div>

    <div class="palace-station">
      <div class="station-num">2</div>
      <div class="station-body"><b>Left Wing, Tank 2 — The Plasmodium Explosion Chamber</b><br>
      A walled chamber (schizont wall) where ONE nucleus inside multiplies into many tiny dots, then the wall BURSTS, releasing a swarm. Label: <b>Multiple Fission</b> (Plasmodium → malaria, via female Anopheles mosquito).</div>
    </div>

  <p class="page-sub">Read this page the night before every mock test. These are the exact confusions that cost marks.</p>

  <div class="trap-box"><div class="trap-title">⚠ 1. Anopheles vs Aedes aegypti</div><p>Female Anopheles → Malaria. Aedes aegypti → Dengue, Chikungunya. Never swap these.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 2. Binary Fission vs Fragmentation</div><p>Binary fission: breaks while IMMATURE, then grows. Fragmentation: breaks only after becoming MATURE (seen in algae).</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 3. Budding vs Vegetative Propagation (Bryophyllum/Potato)</div><p>Budding = bud grows to FULL size while still attached, then detaches (Hydra). Bryophyllum/potato buds detach early and grow only after reaching soil → that's vegetative propagation, NOT budding.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 4. Regeneration ≠ Primary Reproduction</div><p>Regeneration (Planaria, Hydra, Rhizopus) only happens after damage/injury — it is a repair mechanism, not a planned reproductive strategy.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 5. Planaria vs Liver Fluke vs Tapeworm (Platyhelminthes)</div><p>Planaria = free-living (has eyes). Liver fluke & tapeworm = parasitic. All three share the same phylum but very different lifestyles.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 6. Epididymis vs Seminal Vesicle</div><p>The structure directly after the testis is the EPIDIDYMIS, not "seminal vesicle." Order: Testis → Epididymis → Vas deferens → Prostate/seminal fluid added → Urethra.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 7. Menarche vs Menopause</div><p>Menarche = FIRST period (puberty start, ~12–15 yrs). Menopause = ovulation permanently STOPS (~50 yrs). Opposite life-stage events; don't swap.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 8. Fertilization site vs Implantation site</div><p>Fertilization happens in the FALLOPIAN TUBE. Implantation happens in the UTERUS. These are two different, sequential locations.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 9. Umbilical Vein vs Umbilical Artery (reversed from normal anatomy logic)</div><p>Umbilical VEIN carries oxygenated blood + nutrients INTO the fetus. Umbilical ARTERY carries deoxygenated waste OUT of the fetus. This is the opposite of how arteries/veins are usually described relative to the heart.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 10. Parthenogenesis — asexual despite involving an "egg"</div><p>No fertilization + no male gamete = still classified as asexual, even though an egg is involved (honey bees).</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 11. Filament (Stamen) vs Style (Pistil)</div><p>Both are stalk-like connector parts, but Filament belongs to the MALE stamen (holds the anther); Style belongs to the FEMALE pistil (connects stigma to ovary).</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 12. Ovary vs Ovule</div><p>Ovary (bigger structure) → becomes Fruit. Ovule (smaller structures inside the ovary) → becomes Seed.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 13. Bisexual/Unisexual (flower-level) vs Monoecious/Dioecious (plant-level)</div><p>Bisexual/Unisexual describes a SINGLE FLOWER. Monoecious/Dioecious describes the WHOLE PLANT. A bisexual flower automatically implies a monoecious plant — but not vice versa.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 14. Chemotropism vs Phototropism/Geotropism/Hydrotropism</div><p>Chemotropism = response to a CHEMICAL stimulus (pollen tube growth toward ovule). The other three tropisms (light, gravity, water) belong to a different lecture but are easily confused on sight.</p></div>

  <div class="trap-box"><div class="trap-title">⚠ 15. Algae Colour Groups</div><p>Chlorophyceae = green (Spirogyra, Volvox, Ulothrix). Phaeophyceae = brown (Laminaria, Sargassum). Rhodophyceae = red (source of agar/jelly). Easily jumbled under exam pressure.</p></div>
`;

/* ===========================================================
   BUILD SIDEBAR + PAGES
=========================================================== */
const navScroll = document.getElementById("navScroll");
const pagesContainer = document.getElementById("pages");
let groupsSeen = {};

pages.forEach((p, idx) => {
  if(!groupsSeen[p.group]){
    groupsSeen[p.group] = true;
    const label = document.createElement("div");
    label.className = "nav-group-label";
    label.textContent = p.group;
    navScroll.appendChild(label);
  }
  const item = document.createElement("div");
  item.className = "nav-item";
  item.dataset.page = p.id;
  item.innerHTML = `<span class="dot"></span><span class="nav-icon">${p.icon}</span><span>${p.label}</span>`;
  item.addEventListener("click", () => goToPage(p.id));
  navScroll.appendChild(item);

  const pageDiv = document.createElement("div");
  pageDiv.className = "page";
  pageDiv.id = "page-" + p.id;
  pageDiv.innerHTML = content[p.id] + buildFooterNav(idx);
  pagesContainer.appendChild(pageDiv);
});

function buildFooterNav(idx){
  const prev = pages[idx-1];
  const next = pages[idx+1];
  let html = `<div class="page-nav-footer">`;
  html += prev ? `<button class="nav-footer-btn" onclick="goToPage('${prev.id}')">← ${prev.label}</button>` : `<span></span>`;
  html += next ? `<button class="nav-footer-btn" onclick="goToPage('${next.id}')">${next.label} →</button>` : `<span></span>`;
  html += `</div>`;
  return html;
}

/* ===========================================================
   NAVIGATION LOGIC
=========================================================== */
const STORAGE_KEY = "bio-repro-revision-progress";
let revisedPages = new Set();
try{
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  revisedPages = new Set(saved);
}catch(e){revisedPages = new Set();}

function goToPage(id){
  document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const pageEl = document.getElementById("page-" + id);
  const navEl = document.querySelector('.nav-item[data-page="'+id+'"]');
  if(pageEl) pageEl.classList.add("active");
  if(navEl){
    navEl.classList.add("active");
    navEl.scrollIntoView({block:"nearest"});
  }
  document.getElementById("main").scrollTop = 0;
  const pInfo = pages.find(p => p.id === id);
  document.getElementById("topbarPage").textContent = pInfo ? "· " + pInfo.label : "";
  updateMarkDoneBtn(id);
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  window.location.hash = id;
}

function updateMarkDoneBtn(id){
  const btn = document.getElementById("markDoneBtn");
  if(revisedPages.has(id)){
    btn.classList.add("done");
    btn.textContent = "✓ Revised";
  } else {
    btn.classList.remove("done");
    btn.textContent = "✓ Mark page revised";
  }
}

document.getElementById("markDoneBtn").addEventListener("click", () => {
  const activePage = document.querySelector(".page.active");
  if(!activePage) return;
  const id = activePage.id.replace("page-", "");
  if(revisedPages.has(id)){
    revisedPages.delete(id);
  } else {
    revisedPages.add(id);
  }
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify([...revisedPages])); }catch(e){}
  updateMarkDoneBtn(id);
  updateProgress();
});

function updateProgress(){
  const pct = Math.round((revisedPages.size / pages.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressPct").textContent = pct + "%";
}

/* Mobile menu */
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
document.getElementById("menuBtn").addEventListener("click", () => {
  sidebar.classList.add("open");
  overlay.classList.add("show");
});
overlay.addEventListener("click", () => {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
});

/* Init */
updateProgress();
const initial = (window.location.hash || "").replace("#","") || pages[0].id;
goToPage(pages.find(p=>p.id===initial) ? initial : pages[0].id);
</script>
