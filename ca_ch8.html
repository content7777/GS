<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feb 2025 Current Affairs — SSC CGL Digest</title>
<style>
  :root{
    --bg:#0f1117;
    --bg-panel:#151822;
    --bg-card:#1a1e2b;
    --bg-card-hover:#1f2432;
    --border:#262c3d;
    --green:#8ef5c4;
    --green-dim:#4fae86;
    --blue:#7dd3fc;
    --blue-dim:#4a9bc9;
    --text:#e9edf5;
    --text-dim:#9aa4bd;
    --amber:#ffcc66;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 10% -10%, rgba(126,232,196,0.07), transparent 40%),
      radial-gradient(circle at 90% 0%, rgba(125,211,252,0.06), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Segoe UI', 'Inter', system-ui, -apple-system, Arial, sans-serif;
    min-height:100vh;
    display:flex;
    overflow-x:hidden;
  }

  /* ===== SIDEBAR ===== */
  #sidebar{
    width:270px;
    min-width:270px;
    background:var(--bg-panel);
    border-right:1px solid var(--border);
    height:100vh;
    position:sticky;
    top:0;
    display:flex;
    flex-direction:column;
    padding:22px 14px;
    overflow-y:auto;
    z-index:50;
    transition:transform .25s ease;
  }
  #sidebar .brand{
    padding:6px 10px 20px 10px;
    border-bottom:1px solid var(--border);
    margin-bottom:16px;
  }
  #sidebar .brand h1{
    font-size:17px;
    margin:0 0 4px 0;
    letter-spacing:.3px;
    background:linear-gradient(90deg,var(--green),var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight:800;
  }
  #sidebar .brand p{
    margin:0;
    font-size:11.5px;
    color:var(--text-dim);
    letter-spacing:.5px;
    text-transform:uppercase;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 12px;
    border-radius:10px;
    color:var(--text-dim);
    cursor:pointer;
    font-size:14.5px;
    margin-bottom:3px;
    border:1px solid transparent;
    transition:all .15s ease;
    user-select:none;
  }
  .nav-item .ic{font-size:16px; width:20px; text-align:center;}
  .nav-item .count{
    margin-left:auto;
    font-size:11px;
    color:var(--text-dim);
    background:rgba(255,255,255,0.05);
    padding:1px 7px;
    border-radius:20px;
  }
  .nav-item:hover{background:var(--bg-card-hover); color:var(--text);}
  .nav-item.active{
    background:linear-gradient(90deg, rgba(126,232,196,0.14), rgba(125,211,252,0.09));
    border-color:rgba(126,232,196,0.35);
    color:var(--text);
    font-weight:600;
  }
  .nav-item.active .count{
    background:rgba(126,232,196,0.2);
    color:var(--green);
  }
  #sidebar .footer-note{
    margin-top:auto;
    padding:14px 10px 4px 10px;
    font-size:11px;
    color:var(--text-dim);
    border-top:1px solid var(--border);
  }
  #menu-toggle{
    display:none;
    position:fixed;
    top:16px; left:16px;
    z-index:100;
    background:var(--bg-card);
    border:1px solid var(--border);
    color:var(--text);
    width:42px;height:42px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
  }

  /* ===== MAIN ===== */
  #main{
    flex:1;
    min-width:0;
    padding:36px 42px 80px 42px;
    max-width:1100px;
  }
  .page{ display:none; animation:fadeIn .35s ease; }
  .page.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .page-header{
    margin-bottom:26px;
    padding-bottom:18px;
    border-bottom:1px solid var(--border);
  }
  .page-header .eyebrow{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--blue);
    font-weight:700;
    margin-bottom:6px;
  }
  .page-header h2{
    font-size:30px;
    margin:0 0 8px 0;
    font-weight:800;
  }
  .page-header p{
    color:var(--text-dim);
    font-size:14.5px;
    margin:0;
    max-width:640px;
    line-height:1.5;
  }

  /* ===== CARDS ===== */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(310px, 1fr));
    gap:18px;
  }
  .card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 20px 18px 20px;
    position:relative;
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:rgba(126,232,196,0.4);
    box-shadow:0 10px 26px rgba(0,0,0,0.35);
  }
  .card.priority{
    border-color:rgba(255,204,102,0.45);
    background:linear-gradient(180deg, rgba(255,204,102,0.05), var(--bg-card) 40%);
  }
  .card-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
  }
  .card h3{
    font-size:16px;
    margin:0;
    line-height:1.35;
    font-weight:700;
    color:var(--text);
  }
  .badge{
    flex-shrink:0;
    font-size:10.5px;
    font-weight:700;
    padding:4px 9px;
    border-radius:20px;
    white-space:nowrap;
    letter-spacing:.3px;
  }
  .badge.high{
    background:rgba(255,204,102,0.16);
    color:var(--amber);
    border:1px solid rgba(255,204,102,0.4);
  }
  .card ul{
    margin:0;
    padding-left:18px;
    font-size:13.5px;
    line-height:1.65;
    color:#cdd4e4;
  }
  .card ul li{ margin-bottom:4px; }
  .card ul li::marker{ color:var(--green); }
  .card .tag-row{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .tag{
    font-size:10.5px;
    background:rgba(125,211,252,0.1);
    color:var(--blue);
    border:1px solid rgba(125,211,252,0.25);
    padding:3px 8px;
    border-radius:20px;
  }

  /* section divider inside a page for sub-groups */
  .subhead{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--green);
    font-weight:700;
    margin:30px 0 14px 0;
    padding-left:2px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .subhead::after{
    content:'';
    flex:1;
    height:1px;
    background:linear-gradient(90deg, var(--border), transparent);
  }
  .subhead:first-child{ margin-top:0; }

  /* Days grid (compact list) */
  .days-list{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    gap:10px;
  }
  .day-chip{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    font-size:13.5px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .day-chip .date{ color:var(--blue); font-weight:700; font-size:12px; }
  .day-chip.priority{ border-color:rgba(255,204,102,0.45); }
  .day-chip .theme{ color:var(--text-dim); font-size:12px; }

  /* Quiz mode */
  #quiz-toggle{
    position:fixed;
    bottom:24px;
    right:28px;
    background:linear-gradient(90deg,var(--green),var(--blue));
    color:#0f1117;
    border:none;
    padding:13px 20px;
    border-radius:30px;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(126,232,196,0.25);
    z-index:60;
  }
  #quiz-toggle:hover{ filter:brightness(1.08); }

  .progress-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    background:var(--bg-panel);
    border:1px solid var(--border);
    padding:10px 16px;
    border-radius:12px;
    font-size:12.5px;
    color:var(--text-dim);
  }
  .progress-bar{
    flex:1;
    height:6px;
    background:rgba(255,255,255,0.06);
    border-radius:6px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--blue));
    width:0%;
    transition:width .3s ease;
  }

  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#2a3040; border-radius:10px; }

  @media(max-width:900px){
    #sidebar{
      position:fixed;
      transform:translateX(-100%);
      box-shadow:0 0 40px rgba(0,0,0,0.5);
    }
    #sidebar.open{ transform:translateX(0); }
    #menu-toggle{ display:block; }
    #main{ padding:80px 18px 60px 18px; }
    #quiz-toggle{ right:16px; bottom:16px; padding:11px 16px; font-size:13px;}
  }
</style>
</head>

/* ================== RENDER ================== */
const navWrap = document.getElementById('nav-items');
const pagesWrap = document.getElementById('pages');

function countCards(section){
  if(section.id === "days") return DAYS.length;
  return section.groups.reduce((a,g)=>a+g.cards.length,0);
}

DATA.forEach((section, idx)=>{
  // nav item
  const nav = document.createElement('div');
  nav.className = 'nav-item' + (idx===0 ? ' active':'');
  nav.dataset.target = section.id;
  nav.innerHTML = `<span class="ic">${section.icon}</span><span>${section.title}</span><span class="count">${countCards(section)}</span>`;
  nav.onclick = ()=> showPage(section.id);
  navWrap.appendChild(nav);

  // page
  const page = document.createElement('div');
  page.className = 'page' + (idx===0 ? ' active':'');
  page.id = 'page-'+section.id;

  let html = `<div class="page-header">
      <div class="eyebrow">${section.icon} Section ${idx+1} of ${DATA.length}</div>
      <h2>${section.title}</h2>
      <p>${section.desc}</p>
    </div>`;

  if(section.id === "days"){
    html += `<div class="days-list">`;
    DAYS.forEach(d=>{
      html += `<div class="day-chip ${d.priority?'priority':''}">
        <span class="date">${d.date}${d.priority?' 🔥':''}</span>
        <span>${d.name}</span>
        ${d.theme?`<span class="theme">${d.theme}</span>`:''}
      </div>`;
    });
    html += `</div>`;
  } else {
    section.groups.forEach(group=>{
      html += `<div class="subhead">${group.head}</div><div class="grid">`;
      group.cards.forEach(card=>{
        html += `<div class="card ${card.priority?'priority':''}">
          <div class="card-top">
            <h3>${card.title}</h3>
            ${card.priority?'<span class="badge high">🔥 High Priority</span>':''}
          </div>
          <ul>${card.points.map(p=>`<li>${p}</li>`).join('')}</ul>
          <div class="tag-row">${(card.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>`;
      });
      html += `</div>`;
    });
  }

  page.innerHTML = html;
  pagesWrap.appendChild(page);
});

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector(`.nav-item[data-target="${id}"]`).classList.add('active');
  document.getElementById('main').scrollTo({top:0, behavior:'smooth'});
  if(window.innerWidth <= 900){ document.getElementById('sidebar').classList.remove('open'); }
}

document.getElementById('menu-toggle').onclick = ()=>{
  document.getElementById('sidebar').classList.toggle('open');
};

/* ================== QUICK RAPID-REVISION QUIZ ================== */
function buildQuizPool(){
  const pool = [];
  DATA.forEach(section=>{
    if(section.id==="days") return;
    section.groups.forEach(g=>{
      g.cards.forEach(c=>{
        if(c.priority){
          pool.push({section:section.title, title:c.title, points:c.points});
        }
      });
    });
  });
  return pool;
}

function startQuiz(){
  const pool = buildQuizPool();
  let i = 0;
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(6,7,11,0.88);backdrop-filter:blur(6px);
    z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;`;
  overlay.innerHTML = `<div style="max-width:560px;width:100%;background:var(--bg-card);border:1px solid var(--border);
    border-radius:18px;padding:28px 26px;position:relative;">
      <button id="quiz-close" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;">✕</button>
      <div class="progress-wrap" style="margin-bottom:18px;">
        <span id="quiz-count">1 / ${pool.length}</span>
        <div class="progress-bar"><div class="progress-fill" id="quiz-fill"></div></div>
      </div>
      <div id="quiz-body"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button id="quiz-reveal" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-panel);color:var(--text);cursor:pointer;font-weight:600;">Reveal Facts</button>
        <button id="quiz-next" style="flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--green),var(--blue));color:#0f1117;cursor:pointer;font-weight:700;">Next →</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  function render(){
    const item = pool[i];
    document.getElementById('quiz-count').textContent = `${i+1} / ${pool.length}`;
    document.getElementById('quiz-fill').style.width = `${((i+1)/pool.length)*100}%`;
    document.getElementById('quiz-body').innerHTML = `
      <div style="font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">${item.section}</div>
      <h3 style="font-size:19px;margin:0 0 14px 0;">${item.title}</h3>
      <ul id="quiz-answer" style="display:none;padding-left:18px;font-size:14px;line-height:1.7;color:#cdd4e4;">
        ${item.points.map(p=>`<li>${p}</li>`).join('')}
      </ul>`;
  }
  render();

  document.getElementById('quiz-reveal').onclick = ()=>{
    document.getElementById('quiz-answer').style.display = 'block';
  };
  document.getElementById('quiz-next').onclick = ()=>{
    i = (i+1) % pool.length;
    render();
  };
  document.getElementById('quiz-close').onclick = ()=> overlay.remove();
}
</script>
