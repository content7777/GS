function renderHome(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="home-hero">
      <h1>March 2026 Current Affairs</h1>
      <p>Curated from live class — SSC CGL exam-relevant only</p>
      <div class="home-grid" id="homeGrid"></div>
    </div>
  `;
  const grid = document.getElementById('homeGrid');
  const meta = {
    national:['🇮🇳','National'], state:['🗺️','State News'], international:['🌍','International'],
    appointments:['🧑‍💼','Appointments'], defence:['🛡️','Defence'], scitech:['🚀','Science & Tech'],
    schemes:['🏛️','Govt Schemes'], bills:['⚖️','Bills & Acts'], reports:['📊','Reports & Rankings'],
    sports:['🏆','Sports'], awards:['🏅','Awards'], books:['📚','Books & Authors']
  };
  Object.keys(data).forEach(key=>{
    const d = data[key];
    const div = document.createElement('div');
    div.className='home-card';
    div.onclick=()=>{ showSection(key); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); [...document.querySelectorAll('.nav-btn')].find(b=>b.getAttribute('onclick')===`showSection('${key}')`)?.classList.add('active'); };
    div.innerHTML = `<div class="emoji">${meta[key][0]}</div><h4>${meta[key][1]}</h4><span>${d.items.length} items</span>`;
    grid.appendChild(div);
  });
}

function renderSection(key){
  const d = data[key];
  const main = document.getElementById('main');
  let html = `<h2>${d.title}</h2><div class="section-sub">${d.sub}</div><div class="grid">`;
  d.items.forEach(item=>{
    html += `<div class="card ${item.high?'high':''}">`;
    if(item.high) html += `<div class="badge">🔥 High Priority</div>`;
    html += `<h3>${item.h}</h3><ul>`;
    item.points.forEach(p=> html += `<li>${p}</li>`);
    html += `</ul></div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
}

function showSection(key){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach(b=>{
    if(b.getAttribute('onclick') === `showSection('${key}')`) b.classList.add('active');
  });
  if(key==='home'){ renderHome(); }
  else { renderSection(key); }
}

// init counts
Object.keys(data).forEach(k=>{
  const el = document.getElementById('c-'+k);
  if(el) el.textContent = data[k].items.length;
});

renderHome();
</script>
