<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April 2026 Current Affairs — SSC CGL Capsule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1117;
    --bg-elev:#161925;
    --bg-card:#1b1f2e;
    --line:#2a2f42;
    --green:#7CFFCB;
    --green-dim:#3fae8b;
    --blue:#7CD4FF;
    --blue-dim:#4a90c2;
    --text:#eef1f8;
    --text-dim:#9aa3b8;
    --high:#ff8a65;
    --high-bg:rgba(255,138,101,0.12);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 85% -10%, rgba(124,255,203,0.07), transparent 45%),
      radial-gradient(circle at -10% 90%, rgba(124,212,255,0.06), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    display:flex;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background:var(--green-dim); color:#04140f;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--bg-elev);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .brand{
    padding:26px 22px 18px 22px;
    border-bottom:1px solid var(--line);
  }
  .brand .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--green);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:700;
    line-height:1.25;
    margin-top:6px;
    background:linear-gradient(90deg, var(--green), var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .brand p{
    font-size:12px;
    color:var(--text-dim);
    margin-top:6px;
  }
  nav.sections{
    flex:1;
    overflow-y:auto;
    padding:14px 10px;
  }
  nav.sections::-webkit-scrollbar{width:6px;}
  nav.sections::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:11px 12px;
    border:none;
    background:transparent;
    color:var(--text-dim);
    border-radius:10px;
    cursor:pointer;
    font-size:13.5px;
    font-weight:500;
    text-align:left;
    margin-bottom:3px;
    transition:background .15s ease, color .15s ease;
    position:relative;
  }
  .nav-item .ic{ font-size:16px; width:20px; text-align:center; flex-shrink:0;}
  .nav-item .cnt{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--text-dim);
    background:rgba(255,255,255,0.05);
    padding:2px 7px;
    border-radius:20px;
  }
  .nav-item:hover{ background:rgba(255,255,255,0.04); color:var(--text);}
  .nav-item.active{
    background:linear-gradient(90deg, rgba(124,255,203,0.14), rgba(124,212,255,0.06));
    color:var(--text);
  }
  .nav-item.active::before{
    content:"";
    position:absolute;
    left:0; top:8px; bottom:8px;
    width:3px;
    border-radius:3px;
    background:linear-gradient(180deg, var(--green), var(--blue));
  }
  .nav-item.active .cnt{ background:rgba(124,255,203,0.18); color:var(--green);}

  .sidebar-footer{
    padding:16px 20px 20px;
    border-top:1px solid var(--line);
  }
  .filter-toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:var(--bg-card);
    border:1px solid var(--line);
    padding:10px 12px;
    border-radius:12px;
    cursor:pointer;
    font-size:12.5px;
    font-weight:600;
    color:var(--text-dim);
    transition:all .15s ease;
  }
  .filter-toggle.on{
    border-color:var(--high);
    color:var(--high);
    background:var(--high-bg);
  }
  .switch{
    width:34px; height:18px;
    border-radius:20px;
    background:#333a4f;
    position:relative;
    flex-shrink:0;
    transition:background .15s ease;
  }
  .switch::after{
    content:"";
    position:absolute;
    top:2px; left:2px;
    width:14px; height:14px;
    border-radius:50%;
    background:#cfd4e2;
    transition:transform .15s ease;
  }
  .filter-toggle.on .switch{ background:var(--high);}
  .filter-toggle.on .switch::after{ transform:translateX(16px); background:#1a0d08;}

  .progress-line{
    margin-top:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--text-dim);
    display:flex;
    justify-content:space-between;
  }
  .progress-track{
    margin-top:6px;
    height:5px;
    border-radius:6px;
    background:#242938;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--green), var(--blue));
    transition:width .3s ease;
  }

  /* ---------- MAIN ---------- */
  main{
    flex:1;
    min-width:0;
    height:100vh;
    overflow-y:auto;
    padding:36px 44px 80px;
  }
  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:28px;
    padding-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  .topbar .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--blue);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .topbar h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:32px;
    font-weight:700;
  }
  .topbar .sub{
    color:var(--text-dim);
    font-size:13.5px;
    margin-top:6px;
    max-width:560px;
    line-height:1.5;
  }
  .stat-pills{ display:flex; gap:10px; flex-wrap:wrap;}
  .pill{
    padding:8px 14px;
    border-radius:30px;
    border:1px solid var(--line);
    background:var(--bg-card);
    font-size:11.5px;
    font-family:'JetBrains Mono', monospace;
    color:var(--text-dim);
    display:flex; align-items:center; gap:6px;
  }
  .pill .dot{ width:7px; height:7px; border-radius:50%;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    gap:18px;
  }

  .card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px 20px 18px;
    position:relative;
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    border-left:3px solid var(--blue-dim);
  }
  .card.high{ border-left:3px solid var(--high);}
  .card:hover{
    transform:translateY(-3px);
    border-color:#3a4058;
    box-shadow:0 12px 28px rgba(0,0,0,0.35);
  }
  .card.done{ opacity:.45; }
  .card-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
  }
  .card-head h3{
    font-family:'Space Grotesk', sans-serif;
    font-size:15.5px;
    font-weight:600;
    line-height:1.35;
    color:var(--text);
  }
  .badge{
    flex-shrink:0;
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    font-weight:600;
    padding:4px 8px;
    border-radius:20px;
    white-space:nowrap;
    letter-spacing:.3px;
  }
  .badge.high{ background:var(--high-bg); color:var(--high); border:1px solid rgba(255,138,101,0.4);}
  .badge.med{ background:rgba(124,212,255,0.1); color:var(--blue); border:1px solid rgba(124,212,255,0.3);}
  .badge.low{ background:rgba(255,255,255,0.05); color:var(--text-dim); border:1px solid var(--line);}

  .card ul{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:7px;
  }
  .card li{
    font-size:13px;
    line-height:1.5;
    color:#c7cde0;
    padding-left:16px;
    position:relative;
  }
  .card li::before{
    content:"▸";
    position:absolute;
    left:0; top:0;
    color:var(--green);
    font-size:12px;
  }
  .card li b, .card li strong{ color:var(--text); font-weight:600;}

  .check-row{
    margin-top:14px;
    padding-top:12px;
    border-top:1px dashed var(--line);
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    user-select:none;
  }
  .check-box{
    width:16px; height:16px;
    border-radius:5px;
    border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
    color:var(--bg);
    flex-shrink:0;
  }
  .card.done .check-box{ background:linear-gradient(135deg, var(--green), var(--blue)); border-color:transparent;}
  .check-row span{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono', monospace;}

  .page{ display:none; animation:fadeIn .35s ease; }
  .page.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .empty-note{
    color:var(--text-dim);
    font-size:13px;
    padding:40px 0;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
  }

  /* Mobile */
  .menu-btn{
    display:none;
    position:fixed;
    top:16px; left:16px;
    z-index:50;
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--text);
    width:40px;height:40px;
    border-radius:10px;
    font-size:18px;
  }
  @media (max-width:900px){
    .menu-btn{ display:block; }
    .sidebar{
      position:fixed;
      left:-300px;
      z-index:40;
      transition:left .25s ease;
      box-shadow:20px 0 60px rgba(0,0,0,0.5);
    }
    .sidebar.open{ left:0; }
    main{ padding:70px 18px 60px; }
    .topbar h2{ font-size:24px; }
  }
</style>
</head>
<body>

<button class="menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

    </div>

  <div id="pagesRoot"></div>
</main>

/* ============ RENDER ============ */
const root = document.getElementById('pagesRoot');
const navList = document.getElementById('navList');
let highOnly = false;
let doneSet = new Set();

const sectionKeys = Object.keys(DATA);
let totalCards = 0;
sectionKeys.forEach(k => totalCards += DATA[k].items.length);

function priorityLabel(p){
  if(p==='high') return {cls:'high', text:'🔥 High Priority'};
  if(p==='med') return {cls:'med', text:'Standard'};
  return {cls:'low', text:'Quick Glance'};
}

function buildNav(){
  navList.innerHTML = '';
  sectionKeys.forEach((key, i) => {
    const sec = DATA[key];
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (i===0 ? ' active' : '');
    btn.dataset.key = key;
    btn.innerHTML = `<span class="ic">${sec.icon}</span><span>${sec.title}</span><span class="cnt">${sec.items.length}</span>`;
    btn.onclick = () => selectSection(key);
    navList.appendChild(btn);
  });
}

function buildPages(){
  root.innerHTML = '';
  sectionKeys.forEach((key, i) => {
    const sec = DATA[key];
    const page = document.createElement('div');
    page.className = 'page' + (i===0 ? ' active' : '');
    page.id = 'page-' + key;
    const grid = document.createElement('div');
    grid.className = 'grid';
    sec.items.forEach((item, idx) => {
      const id = key + '-' + idx;
      const pl = priorityLabel(item.p);
      const card = document.createElement('div');
      card.className = 'card ' + (item.p==='high' ? 'high' : '');
      card.dataset.priority = item.p;
      card.id = 'card-' + id;
      card.innerHTML = `
        <div class="card-head">
          <h3>${item.t}</h3>
          <span class="badge ${pl.cls}">${pl.text}</span>
        </div>
        <ul>${item.b.map(x => `<li>${x}</li>`).join('')}</ul>
        <div class="check-row" onclick="toggleDone('${id}')">
          <div class="check-box">✓</div>
          <span>MARK AS REVISED</span>
        </div>
      `;
      grid.appendChild(card);
    });
    page.appendChild(grid);
    root.appendChild(page);
  });
}

function toggleDone(id){
  const card = document.getElementById('card-' + id);
  if(doneSet.has(id)){ doneSet.delete(id); card.classList.remove('done'); }
  else { doneSet.add(id); card.classList.add('done'); }
  updateProgress();
}

function updateProgress(){
  document.getElementById('progressText').textContent = `${doneSet.size} / ${totalCards}`;
  document.getElementById('progressFill').style.width = (totalCards ? (doneSet.size/totalCards*100) : 0) + '%';
}

function updateTopbar(key){
  const sec = DATA[key];
  document.getElementById('eyebrow').textContent = 'Section · ' + sec.icon;
  document.getElementById('pageTitle').textContent = sec.title;
  document.getElementById('pageSub').textContent = sec.sub;

  const high = sec.items.filter(i=>i.p==='high').length;
  const med = sec.items.filter(i=>i.p==='med').length;
  const low = sec.items.filter(i=>i.p==='low').length;
  document.getElementById('statPills').innerHTML = `
    <div class="pill"><span class="dot" style="background:var(--high)"></span>${high} high priority</div>
    <div class="pill"><span class="dot" style="background:var(--blue)"></span>${med} standard</div>
    <div class="pill"><span class="dot" style="background:var(--text-dim)"></span>${low} quick glance</div>
  `;
}

function selectSection(key){
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.key===key));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-'+key));
  updateTopbar(key);
  applyFilter();
  document.getElementById('main').scrollTo({top:0, behavior:'smooth'});
  document.querySelector('.sidebar').classList.remove('open');
}

function toggleHighOnly(){
  highOnly = !highOnly;
  document.getElementById('hiToggle').classList.toggle('on', highOnly);
  applyFilter();
}

function applyFilter(){
  document.querySelectorAll('.page.active .card').forEach(card => {
    if(highOnly && card.dataset.priority !== 'high'){
      card.style.display = 'none';
    } else {
      card.style.display = '';
    }
  });
  const activePage = document.querySelector('.page.active');
  const visible = activePage.querySelectorAll('.card:not([style*="display: none"])').length;
  let note = activePage.querySelector('.empty-note');
  if(highOnly && visible===0){
    if(!note){
      note = document.createElement('div');
      note.className = 'empty-note';
      note.textContent = 'No high-priority items in this section — good, you can breeze through it.';
      activePage.appendChild(note);
    }
  } else if(note){ note.remove(); }
}

buildNav();
buildPages();
updateTopbar(sectionKeys[0]);
updateProgress();
</script>
</body>
</html>
