<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>October Current Affairs — SSC CGL Study Companion</title>
<style>
  :root{
    --bg: #12161c;
    --bg-panel: #171c23;
    --bg-card: #1b212a;
    --bg-card-hover: #202732;
    --line: #2a323d;
    --line-soft: #232a33;
    --text: #dce2e8;
    --text-dim: #8d99a6;
    --text-faint: #5f6b78;
    --accent: #8fb9ab;
    --accent-soft: rgba(143,185,171,0.14);
    --gold: #cba565;
    --gold-soft: rgba(203,165,101,0.14);
    --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, "Source Serif Pro", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle vignette texture */
  body::before{
    content:"";
    position: fixed; inset:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(143,185,171,0.05), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 100%, rgba(203,165,101,0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Sidebar ===== */
  .sidebar{
    width: 272px;
    flex-shrink: 0;
    background: var(--bg-panel);
    border-right: 1px solid var(--line);
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    z-index: 5;
  }

  .brand{
    padding: 28px 24px 20px 24px;
    border-bottom: 1px solid var(--line-soft);
  }
  .brand .kicker{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display:block;
  }
  .brand h1{
    font-family: var(--serif);
    font-weight: 500;
    font-size: 23px;
    line-height: 1.25;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .brand .sub{
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  nav.sections{
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
  }
  nav.sections::-webkit-scrollbar{ width: 6px; }
  nav.sections::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }

  .nav-item{
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    position: relative;
  }
  .nav-item:hover{ background: var(--bg-card); color: var(--text); }
  .nav-item.active{
    background: var(--accent-soft);
    color: var(--accent);
  }
  .nav-item.active::before{
    content:"";
    position: absolute;
    left: -12px; top: 8px; bottom: 8px;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
  }
  .nav-item .num{
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    width: 18px;
    flex-shrink: 0;
  }
  .nav-item.active .num{ color: var(--accent); }
  .nav-item .count{
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-faint);
    background: var(--bg-card);
    padding: 2px 6px;
    border-radius: 20px;
  }
  .nav-item.active .count{ background: rgba(143,185,171,0.2); color: var(--accent); }

  .sidebar-footer{
    padding: 16px 24px;
    border-top: 1px solid var(--line-soft);
  }
  .priority-toggle{
    display:flex;
    align-items:center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    color: var(--text-dim);
  }
  .switch{
    width: 34px; height: 19px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .switch::after{
    content:"";
    position:absolute;
    top: 2px; left: 2px;
    width: 13px; height: 13px;
    background: var(--text-faint);
    border-radius: 50%;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .priority-toggle.on .switch{ background: var(--gold-soft); border-color: var(--gold); }
  .priority-toggle.on .switch::after{ transform: translateX(15px); background: var(--gold); }

  /* ===== Main ===== */
  main{
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .topbar{
    position: sticky;
    top: 0;
    background: rgba(18,22,28,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line-soft);
    padding: 22px 44px;
    z-index: 4;
  }
  .topbar .eyebrow{
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .topbar h2{
    font-family: var(--serif);
    font-weight: 500;
    font-size: 30px;
    color: var(--text);
  }
  .topbar .meta{
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  .content{
    padding: 34px 44px 80px 44px;
    max-width: 1160px;
  }

  .view{ display: none; animation: fadeIn 0.35s ease; }
  .view.active{ display: block; }
  @keyframes fadeIn{
    from{ opacity: 0; transform: translateY(6px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }

  .card{
    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 20px 22px;
    transition: border-color 0.2s ease, transform 0.15s ease, background 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card:hover{
    background: var(--bg-card-hover);
    border-color: var(--line);
    transform: translateY(-1px);
  }
  .card.priority{
    border-left: 3px solid var(--gold);
    background: linear-gradient(180deg, rgba(203,165,101,0.055), transparent 40%), var(--bg-card);
  }
  .card.priority:hover{
    background: linear-gradient(180deg, rgba(203,165,101,0.08), transparent 40%), var(--bg-card-hover);
  }

  .card-head{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .card h3{
    font-family: var(--serif);
    font-weight: 500;
    font-size: 17px;
    line-height: 1.35;
    color: var(--text);
  }
  .badge{
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 20px;
    white-space: nowrap;
    background: var(--gold-soft);
    color: var(--gold);
    border: 1px solid rgba(203,165,101,0.35);
  }

  .card ul{
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .card ul li{
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-dim);
    padding-left: 15px;
    position: relative;
  }
  .card ul li::before{
    content:"";
    position: absolute;
    left: 0; top: 8px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.55;
  }
  .card.priority ul li::before{ background: var(--gold); opacity: 0.75; }
  .card ul li b, .card ul li strong{ color: var(--text); font-weight: 600; }

  .card-tag{
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--line-soft);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }

  /* Days grid special */
  .days-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .day-card{
    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-date{
    font-family: var(--serif);
    font-size: 22px;
    color: var(--gold);
    flex-shrink: 0;
    min-width: 34px;
  }
  .day-name{ font-size: 13px; color: var(--text); line-height: 1.4; }
  .day-name span{ display:block; font-size: 11px; color: var(--text-faint); margin-top: 2px; }

  /* section intro */
  .section-note{
    font-size: 12.5px;
    color: var(--text-faint);
    margin-bottom: 22px;
    max-width: 700px;
    line-height: 1.6;
    font-style: italic;
  }

  ::selection{ background: rgba(143,185,171,0.35); color: #fff; }

  @media (max-width: 900px){
    body{ flex-direction: column; }
    .sidebar{ width: 100%; height: auto; position: relative; }
    nav.sections{ display:flex; overflow-x:auto; gap:6px; padding: 10px; }
    .nav-item{ flex-shrink:0; }
    .nav-item.active::before{ display:none; }
    .content{ padding: 24px; }
    .topbar{ padding: 18px 24px; }
  }
</style>
</head>

// ===== Render =====
const navEl = document.getElementById('navSections');
const contentEl = document.getElementById('content');
const viewTitleEl = document.getElementById('viewTitle');
const viewMetaEl = document.getElementById('viewMeta');
let priorityOnly = false;

DATA.forEach((section, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-item' + (i === 0 ? ' active' : '');
  btn.dataset.id = section.id;
  const countLabel = section.isDays ? section.items.length : section.items.length;
  btn.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span><span>${section.label}</span><span class="count">${countLabel}</span>`;
  btn.addEventListener('click', () => showSection(section.id));
  navEl.appendChild(btn);

  const view = document.createElement('div');
  view.className = 'view' + (i === 0 ? ' active' : '');
  view.id = 'view-' + section.id;
  contentEl.appendChild(view);
});

function renderSection(section){
  const view = document.getElementById('view-' + section.id);
  view.innerHTML = '';

  const noteEl = document.createElement('p');
  noteEl.className = 'section-note';
  noteEl.textContent = section.note;
  view.appendChild(noteEl);

  if(section.isDays){
    const grid = document.createElement('div');
    grid.className = 'days-grid';
    section.items.forEach(d => {
      const card = document.createElement('div');
      card.className = 'day-card';
      card.innerHTML = `<div class="day-date">${d.date}</div><div class="day-name">${d.name}${d.sub ? `<span>${d.sub}</span>` : ''}</div>`;
      grid.appendChild(card);
    });
    view.appendChild(grid);
    return;
  }

  const items = priorityOnly ? section.items.filter(it => it.priority) : section.items;
  const grid = document.createElement('div');
  grid.className = 'grid';

  if(items.length === 0){
    const empty = document.createElement('p');
    empty.style.color = 'var(--text-faint)';
    empty.style.fontSize = '13px';
    empty.textContent = 'No high-priority items in this section — toggle off the filter to see all.';
    view.appendChild(empty);
    return;
  }

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card' + (item.priority ? ' priority' : '');
    const badge = item.priority ? `<span class="badge">🔥 High Priority</span>` : '';
    const points = item.points.map(p => `<li>${p}</li>`).join('');
    card.innerHTML = `
      <div class="card-head">
        <h3>${item.title}</h3>
        ${badge}
      </div>
      <ul>${points}</ul>
    `;
    grid.appendChild(card);
  });

  view.appendChild(grid);
}

function showSection(id){
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + id));
  const section = DATA.find(s => s.id === id);
  viewTitleEl.textContent = section.label;
  const total = section.items.length;
  const shown = section.isDays ? total : (priorityOnly ? section.items.filter(it => it.priority).length : total);
  viewMetaEl.textContent = section.isDays ? `${total} observances` : `${shown} of ${total} items shown`;
  renderSection(section);
}

document.getElementById('priorityToggle').addEventListener('click', function(){
  priorityOnly = !priorityOnly;
  this.classList.toggle('on', priorityOnly);
  const activeBtn = document.querySelector('.nav-item.active');
  showSection(activeBtn.dataset.id);
});

// initial render of all sections (lazy-ish, but fine at this scale)
DATA.forEach(renderSection);
showSection(DATA[0].id);
</script>
