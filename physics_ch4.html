<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflection &amp; Refraction — SSC CGL Memory System</title>
<style>
:root{
  --bg: #0f1117;
  --bg-soft: #151821;
  --bg-card: #1a1e29;
  --bg-card-hover: #1f2433;
  --border: #262b3a;
  --text: #e8eaf0;
  --text-dim: #a6acc0;
  --text-faint: #6b7280;
  --green: #7ee3a8;
  --green-dim: #4f8a68;
  --green-glow: rgba(126,227,168,0.15);
  --blue: #7ec8f0;
  --blue-dim: #4a7a99;
  --blue-glow: rgba(126,200,240,0.15);
  --amber: #f0c674;
  --red: #f08a8a;
  --purple: #c8a0f0;
  --radius: 14px;
  --serif: "Source Serif Pro", Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* subtle ambient background texture */
body::before{
  content:"";
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 15% 10%, var(--green-glow), transparent 40%),
    radial-gradient(circle at 85% 90%, var(--blue-glow), transparent 40%);
  pointer-events:none;
  z-index:0;
}

#app{ position:relative; z-index:1; display:flex; min-height:100vh; }

/* ============ SIDEBAR ============ */
#sidebar{
  width: 280px;
  flex-shrink:0;
  background: var(--bg-soft);
  border-right: 1px solid var(--border);
  height: 100vh;
  position: sticky;
  top:0;
  overflow-y:auto;
  padding: 22px 14px 30px;
  scrollbar-width: thin;
}
#sidebar::-webkit-scrollbar{ width:6px; }
#sidebar::-webkit-scrollbar-thumb{ background: var(--border); border-radius:4px; }

.brand{
  padding: 4px 12px 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.brand .eyebrow{
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--green);
  font-weight: 600;
}
.brand h1{
  font-family: var(--serif);
  font-size: 19px;
  margin: 6px 0 2px;
  color: var(--text);
  line-height:1.3;
}
.brand .sub{
  font-size: 12px;
  color: var(--text-faint);
}

.nav-group{ margin-bottom: 4px; }
.nav-group-label{
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 14px 12px 6px;
  font-weight: 600;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding: 9px 12px;
  border-radius: 10px;
  cursor:pointer;
  font-size: 13.5px;
  color: var(--text-dim);
  transition: background .15s, color .15s;
  user-select:none;
  border:1px solid transparent;
}
.nav-item:hover{ background: var(--bg-card); color: var(--text); }
.nav-item.active{
  background: linear-gradient(90deg, var(--green-glow), transparent);
  color: var(--green);
  border-color: var(--green-dim);
  font-weight:600;
}
.nav-item .ico{ font-size:14px; width:18px; text-align:center; flex-shrink:0; }
.nav-item .progress-dot{
  width:6px; height:6px; border-radius:50%;
  background: var(--border);
  margin-left:auto;
  flex-shrink:0;
  transition: background .2s;
}
.nav-item.visited .progress-dot{ background: var(--green); }

#progress-track{
  margin: 16px 12px 4px;
  height: 5px;
  background: var(--bg-card);
  border-radius: 4px;
  overflow:hidden;
  border:1px solid var(--border);
}
#progress-fill{
  height:100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  width:0%;
  transition: width .3s ease;
}
#progress-label{
  font-size: 10.5px;
  color: var(--text-faint);
  padding: 4px 12px 10px;
}

/* ============ MAIN ============ */
#main{
  flex:1;
  min-width:0;
  height:100vh;
  overflow-y:auto;
  scroll-behavior:smooth;
}
.topbar{
  position: sticky;
  top:0;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding: 14px 28px;
  background: rgba(15,17,23,0.88);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
#hamburger{
  display:none;
  background:none; border:none; color:var(--text);
  font-size:20px; cursor:pointer; padding:4px 8px;
}
.crumb{ font-size:12.5px; color: var(--text-faint); }
.crumb b{ color: var(--blue); font-weight:600; }
.topbar-actions{ display:flex; gap:8px; }
.tb-btn{
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 13px;
  border-radius: 8px;
  font-size: 12.5px;
  cursor:pointer;
  transition: all .15s;
}
.tb-btn:hover{ border-color: var(--green-dim); color: var(--green); }

.page{
  display:none;
  padding: 36px 44px 90px;
  max-width: 920px;
  margin: 0 auto;
  animation: fadeIn .35s ease;
}
.page.active{ display:block; }
@keyframes fadeIn{ from{opacity:0; transform: translateY(6px);} to{opacity:1; transform: translateY(0);} }

.page-header{ margin-bottom: 28px; }
.page-eyebrow{
  font-size: 11.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
}
.page-title{
  font-family: var(--serif);
  font-size: 32px;
  margin: 0 0 8px;
  color: var(--text);
  line-height:1.2;
}
.page-desc{ color: var(--text-dim); font-size: 14.5px; max-width: 640px; }

/* ===== reusable content blocks ===== */
.card{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 18px;
}
.card h3{
  margin: 0 0 12px;
  font-size: 16px;
  color: var(--text);
  display:flex; align-items:center; gap:8px;
}
.card p{ margin: 8px 0; color: var(--text-dim); font-size: 14px; }
.card ul, .card ol{ margin: 8px 0 8px 4px; padding-left: 18px; color: var(--text-dim); font-size:14px;}
.card li{ margin-bottom: 6px; }

.tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  margin-right:6px;
  letter-spacing:0.02em;
}
.tag-must{ background: rgba(240,138,138,0.15); color: var(--red); border:1px solid rgba(240,138,138,0.35); }
.tag-imp{ background: rgba(240,198,116,0.15); color: var(--amber); border:1px solid rgba(240,198,116,0.35); }
.tag-good{ background: rgba(126,200,240,0.15); color: var(--blue); border:1px solid rgba(126,200,240,0.35); }

.trap-box{
  background: linear-gradient(135deg, rgba(240,138,138,0.08), rgba(240,138,138,0.02));
  border: 1px solid rgba(240,138,138,0.3);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.trap-box .trap-title{ color: var(--red); font-weight:700; font-size:14px; margin-bottom:8px; display:flex; gap:8px; align-items:center;}
.trap-box p, .trap-box li{ color: var(--text-dim); font-size:13.5px; }

.hook-box{
  background: linear-gradient(135deg, rgba(126,227,168,0.08), rgba(126,200,240,0.04));
  border: 1px solid var(--green-dim);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom:14px;
}
.hook-box .hook-title{ color: var(--green); font-weight:700; font-size:14px; margin-bottom:8px; display:flex;gap:8px;align-items:center;}

.palace-step{
  display:flex;
  gap:16px;
  padding: 14px 0;
  border-bottom: 1px dashed var(--border);
}
.palace-step:last-child{ border-bottom:none; }
.palace-num{
  flex-shrink:0;
  width: 34px; height:34px;
  border-radius:50%;
  background: var(--bg-soft);
  border:1px solid var(--blue-dim);
  color: var(--blue);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px;
}
.palace-content h4{ margin:0 0 4px; font-size:14.5px; color:var(--text);}
.palace-content p{ margin:0; font-size:13.5px; color:var(--text-dim);}

table.data-table{
  width:100%;
  border-collapse: collapse;
  font-size: 13.5px;
  margin: 10px 0;
}
table.data-table th{
  text-align:left;
  color: var(--text-faint);
  font-weight:600;
  font-size:11.5px;
  text-transform:uppercase;
  letter-spacing:0.04em;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
table.data-table td{
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
}
table.data-table tr:last-child td{ border-bottom:none; }
table.data-table tr:hover td{ background: var(--bg-card-hover); }
table.data-table td.hl{ color: var(--green); font-weight:600; }
table.data-table td.hl-blue{ color: var(--blue); font-weight:600; }

.formula{
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 8px;
  padding: 14px 18px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--blue);
  margin: 10px 0;
  display:inline-block;
}

.flip-card{
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
  cursor:pointer;
  transition: border-color .2s;
  position:relative;
}
.flip-card:hover{ border-color: var(--blue-dim); }
.flip-card .q{ font-size:14px; color:var(--text); font-weight:600; }
.flip-card .a{
  font-size: 13.5px;
  color: var(--green);
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  display:none;
}
.flip-card.open .a{ display:block; }
.flip-card .hint{ font-size:11px; color:var(--text-faint); margin-top:6px; }

.fill-blank input{
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--green);
  padding: 3px 8px;
  font-size: 13.5px;
  width: 110px;
  font-family: var(--mono);
}
.fill-blank input:focus{ outline:none; border-color: var(--blue); }
.check-btn{
  background: var(--green-dim);
  color: #06140c;
  border:none;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight:600;
  cursor:pointer;
  margin-top: 14px;
}
.check-btn:hover{ filter: brightness(1.1); }
.result-msg{ font-size:13px; margin-top:10px; font-weight:600; }

.diagram-box{
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 14px 0;
  text-align:center;
}
.diagram-box svg{ max-width:100%; }
.diagram-cap{ font-size:12px; color:var(--text-faint); margin-top:8px; }

.pill-row{ display:flex; flex-wrap:wrap; gap:8px; margin: 10px 0; }
.pill{
  background: var(--bg-soft);
  border:1px solid var(--border);
  border-radius:20px;
  padding: 5px 14px;
  font-size:12.5px;
  color: var(--text-dim);
}
.pill.g{ border-color: var(--green-dim); color: var(--green); }
.pill.b{ border-color: var(--blue-dim); color: var(--blue); }

.layer-section{ margin-bottom: 30px; }
.layer-section h2{
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 16px;
  display:flex; align-items:center; gap:10px;
}

.ufast-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 14px;
}
.ufast-card{
  background: var(--bg-card);
  border:1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
}
.ufast-card h4{ margin:0 0 8px; font-size:13.5px; color:var(--blue);}
.ufast-card div{ font-size:13px; color:var(--text-dim); }

.lastnight{
  background: linear-gradient(160deg, rgba(126,227,168,0.06), rgba(15,17,23,0));
  border: 1px solid var(--green-dim);
  border-radius: var(--radius);
  padding: 24px;
}
.lastnight h2{ color: var(--green); font-family: var(--serif); margin-top:0;}
.lastnight .flash{
  font-size: 14.5px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.lastnight .flash:last-child{ border-bottom:none; }
.lastnight .flash b{ color: var(--amber); }

#prevnext{
  display:flex;
  justify-content:space-between;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.nav-btn{
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 10px;
  cursor:pointer;
  font-size: 13.5px;
  transition: all .15s;
  max-width: 45%;
}
.nav-btn:hover{ border-color: var(--green-dim); }
.nav-btn .lbl{ font-size:10.5px; color:var(--text-faint); display:block; margin-bottom:3px; text-transform:uppercase; letter-spacing:0.05em;}
.nav-btn.disabled{ opacity:0.3; pointer-events:none; }

mark.km{ background: rgba(126,227,168,0.2); color: var(--green); padding:1px 5px; border-radius:4px; }
mark.bm{ background: rgba(126,200,240,0.2); color: var(--blue); padding:1px 5px; border-radius:4px; }

/* mobile */
@media (max-width: 860px){
  #hamburger{ display:block; }
  #sidebar{
    position: fixed;
    left: -300px;
    z-index: 50;
    transition: left .25s ease;
    box-shadow: 10px 0 30px rgba(0,0,0,0.4);
  }
  #sidebar.open{ left:0; }
  .page{ padding: 26px 18px 70px; }
  .page-title{ font-size: 25px; }
  #overlay{
    display:none;
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:40;
  }
  #overlay.show{ display:block; }
}
</style>
</head>
<body>
<div id="overlay" onclick="closeSidebar()"></div>
<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar"></aside>

  <!-- MAIN -->
  <main id="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="crumb">Physics — <b id="crumbText">Big Picture</b></div>
      </div>
      <div class="topbar-actions">
        <button class="tb-btn" onclick="markVisitedAndGo(-1)">← Prev</button>
        <button class="tb-btn" onclick="markVisitedAndGo(1)">Next →</button>
      </div>
    </div>
    <div id="pages-root"></div>
  </main>
</div>

<script>
/* ============================================================
   PAGE DEFINITIONS — each page rendered into #pages-root
   ============================================================ */
const PAGES = [];
function addPage(id, group, navLabel, icon, color, html){
  PAGES.push({id, group, navLabel, icon, color, html});
}
const DESIRED_ORDER = [
  "big-picture","memory-palace",
  "reflection-laws","plane-mirror","spherical-basics","concave-image","convex-image","mirror-formula","refraction-laws","glass-slab","lenses",
  "memory-hooks","concept-connections","exam-traps","examiner-questions","active-recall",
  "high-yield","ultra-fast","thirty-sec","last-night"
];
function reorderPages(){
  PAGES.sort((a,b)=> DESIRED_ORDER.indexOf(a.id) - DESIRED_ORDER.indexOf(b.id));
}

/* ============ 3. NATURE OF LIGHT + REFLECTION LAWS ============ */
addPage("reflection-laws","Complete Notes","Light & Reflection Laws","📐","var(--blue)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--blue)">COMPLETE REVISION NOTES · 1</div>
  <h1 class="page-title">Nature of Light & Laws of Reflection</h1>
  <p class="page-desc">The foundation everything else is built on.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Nature of Light</h3>
<ul>
<li>Light is a form of <b>energy</b> with <mark class="bm">dual nature</mark> — it behaves as both a <b>particle</b> and a <b>wave</b>. This hypothesis was proposed by <b style="color:var(--green)">Albert Einstein</b>.</li>
<li>Light is a <b>transverse wave</b>: its particles vibrate <b>perpendicular</b> to the direction of propagation.</li>
<li>Because it's transverse, light: (a) can travel through <b>vacuum</b>, (b) can be <b>polarized</b>.</li>
<li>Contrast: <b>Sound</b> is longitudinal — needs a medium, cannot travel in vacuum, cannot be polarized.</li>
<li>Speed of light in air/vacuum = <span class="formula" style="font-size:14px;padding:6px 10px;">3 × 10⁸ m/s</span>. Speed of sound ≈ 343 m/s. This is why during lightning, you <b>see first, hear later</b>.</li>
</ul>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> What is Reflection?</h3>
<p>Reflection occurs when a light ray strikes a surface and <b>bounces back into the same medium</b> instead of penetrating it.</p>
</div>

<div class="card">
<h3>📏 The Two Laws of Reflection</h3>
<ol>
<li><b>Law 1:</b> Angle of incidence = Angle of reflection (both measured from the <b>normal</b> — the perpendicular line drawn at the point of striking).</li>
<li><b>Law 2:</b> The incident ray, the reflected ray, and the normal — <b>all three lie in the same plane.</b></li>
</ol>
</div>

<div class="diagram-box">
<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
<line x1="20" y1="170" x2="400" y2="170" stroke="#a6acc0" stroke-width="2"/>
<line x1="210" y1="170" x2="210" y2="30" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,4"/>
<text x="216" y="35" fill="#6b7280" font-size="12" font-family="sans-serif">Normal</text>
<line x1="80" y1="50" x2="210" y2="170" stroke="#7ec8f0" stroke-width="2.5"/>
<polygon points="210,170 196,150 200,162" fill="#7ec8f0"/>
<text x="70" y="40" fill="#7ec8f0" font-size="12" font-family="sans-serif">Incident ray (i)</text>
<line x1="210" y1="170" x2="340" y2="50" stroke="#7ee3a8" stroke-width="2.5"/>
<polygon points="340,50 320,58 330,64" fill="#7ee3a8"/>
<text x="300" y="40" fill="#7ee3a8" font-size="12" font-family="sans-serif">Reflected ray (r)</text>
<path d="M 195 155 A 25 25 0 0 1 210 145" fill="none" stroke="#a6acc0" stroke-width="1.5"/>
<text x="178" y="148" fill="#a6acc0" font-size="11" font-family="sans-serif">i</text>
<path d="M 225 145 A 25 25 0 0 1 240 155" fill="none" stroke="#a6acc0" stroke-width="1.5"/>
<text x="232" y="148" fill="#a6acc0" font-size="11" font-family="sans-serif">r</text>
<rect x="20" y="170" width="380" height="6" fill="#262b3a"/>
</svg>
<div class="diagram-cap">∠i = ∠r, and incident ray, reflected ray, normal lie in the same plane</div>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP</div>
<p>Students often confuse "angle of incidence" with the angle measured from the <b>surface</b>. It is always measured from the <b>NORMAL</b> (perpendicular), never from the reflecting surface itself.</p>
</div>
`);

/* ============ 4. PLANE MIRROR ============ */
addPage("plane-mirror","Complete Notes","Plane Mirror","🪞","var(--blue)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--blue)">COMPLETE REVISION NOTES · 2</div>
  <h1 class="page-title">Plane Mirror</h1>
  <p class="page-desc">The simplest case — and the one that defines virtual/real and erect/inverted forever.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Properties</h3>
<table class="data-table">
<tr><th>Property</th><th>Value</th></tr>
<tr><td>Power</td><td class="hl">Zero</td></tr>
<tr><td>Focal length</td><td class="hl">Infinity</td></tr>
<tr><td>Object distance from mirror</td><td>Equal to image distance</td></tr>
<tr><td>Object size</td><td>Equal to image size</td></tr>
<tr><td>Image location</td><td>Behind the mirror</td></tr>
<tr><td>Image type</td><td class="hl-blue">Virtual + Erect</td></tr>
</table>
</div>

<div class="hook-box">
<div class="hook-title">🔑 THE GOLDEN RULE OF THIS ENTIRE CHAPTER</div>
<p style="font-size:15px;color:var(--text)"><b>If the image forms BEHIND the mirror → it is VIRTUAL → it is automatically ERECT (straight).</b></p>
<p style="font-size:15px;color:var(--text)"><b>If the image forms IN FRONT of (on the same side as the object for mirrors) → it is REAL → it is automatically INVERTED (upside down).</b></p>
<p>There is <b>no exception</b> to this pairing for mirrors: virtual ⟺ erect, and real ⟺ inverted always travel together. (Note: this pairing logic flips in <i>which side</i> counts as "real" for lenses — covered later — but virtual⟺erect and real⟺inverted still always hold.)</p>
</div>

<div class="card">
<h3>↔️ Lateral Inversion</h3>
<p>When you look into a plane mirror, your <b>left hand appears as your right hand</b> and vice versa. This left-right flip is called <b>lateral inversion</b>.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP</div>
<p>Don't confuse lateral inversion (left-right flip) with the image being "upside down." A plane mirror image is NOT upside down — it's erect, just laterally flipped. These are two completely different properties tested separately.</p>
</div>
`);

addPage("mirror-formula","Complete Notes","Mirror Formula & Sign Rules","➗","var(--green)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--green)">COMPLETE REVISION NOTES · 6</div>
  <h1 class="page-title">Mirror Formula & Cartesian Sign Convention</h1>
  <p class="page-desc">The numerical-solving toolkit. Get the signs right and the rest is arithmetic.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> The Mirror Formula</h3>
<div class="formula" style="font-size:18px;">1/v + 1/u = 1/f</div>
<p>where <b>v</b> = image distance, <b>u</b> = object distance, <b>f</b> = focal length.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Cartesian Sign Convention Rules</h3>
<table class="data-table">
<tr><th>Quantity</th><th>Rule</th></tr>
<tr><td><b>u (object distance)</b></td><td class="hl">ALWAYS negative — object is always placed in front of the mirror, i.e. on the negative x-axis.</td></tr>
<tr><td><b>f (focal length) — Concave</b></td><td class="hl">ALWAYS negative — "the cave is negative"</td></tr>
<tr><td><b>f (focal length) — Convex</b></td><td class="hl-blue">ALWAYS positive</td></tr>
<tr><td><b>v (image distance)</b></td><td>Depends on the calculation — <b>positive</b> = formed behind mirror (virtual, erect); <b>negative</b> = formed in front of mirror (real, inverted)</td></tr>
</table>
</div>

<div class="hook-box">
<div class="hook-title">🔑 MEMORY HOOK: "The Cave is Always Negative"</div>
<p>Whisper this to yourself in the exam: <b>"Cave = Cold = Negative. Convex = bulges out = Positive."</b> This applies identically whether it's a mirror or (later) a lens.</p>
</div>

<div class="card">
<h3>📐 Magnification Formula</h3>
<div class="formula" style="font-size:16px;">m = Height of image / Height of object = −v/u</div>
<p>Work out v's sign first (from the image's known nature: virtual → v positive; real → v negative), then plug into the formula. u is always negative, so you're really just tracking one sign at a time.</p>
</div>

<div class="card">
<h3>⚙️ Worked Logic — Reverse Direction</h3>
<p>If a question gives you a <b>convex mirror</b> and asks about image nature: you already know convex mirrors ONLY give virtual + erect images, so <b>v must be positive</b> — no calculation needed to know the sign, only to know the magnitude.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP</div>
<p>Students sometimes think "positive v = real" out of habit from coordinate geometry. For MIRRORS: <b>positive v = virtual</b> (behind the mirror). This flips for lenses — see the Lens page. Keep mirror-rules and lens-rules in separate mental drawers.</p>
</div>
`);

addPage("refraction-laws","Complete Notes","Refraction & Snell's Law","🌊","var(--green)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--green)">COMPLETE REVISION NOTES · 7</div>
  <h1 class="page-title">Refraction of Light</h1>
  <p class="page-desc">When light doesn't bounce back, but pushes through into a new medium.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> What is Refraction?</h3>
<p>Refraction is the bending of light as it <b>passes from one medium into another</b> (it does NOT bounce back — that's reflection). The direction and amount of bending depends on whether light moves from a <b>rarer</b> (less dense) medium to a <b>denser</b> (more dense) one, or vice versa.</p>
</div>

<div class="card">
<h3>↔️ The Bending Rules</h3>
<table class="data-table">
<tr><th>Direction of Travel</th><th>Bends</th><th>Speed</th></tr>
<tr><td>Rarer → Denser</td><td class="hl">Toward the Normal</td><td class="hl">Decreases</td></tr>
<tr><td>Denser → Rarer</td><td class="hl-blue">Away from the Normal</td><td class="hl-blue">Increases</td></tr>
</table>
<p style="color:var(--text-faint);font-size:13px;">Examples of rarer→denser order: air (rarest) → water → ordinary glass → diamond (densest of these).</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Laws of Refraction</h3>
<ol>
<li><b>Law 1 (same as reflection's 2nd law):</b> The incident ray, the refracted ray, and the normal all lie in the same plane.</li>
<li><b>Law 2 — Snell's Law:</b> The ratio of sin(angle of incidence) to sin(angle of refraction) is a <b>constant</b> for a given pair of media. This constant is called the <b>refractive index</b>.</li>
</ol>
<div class="formula">sin(i) / sin(r) = constant = Refractive Index (Snell's Law)</div>
</div>

<div class="card">
<h3>📏 Refractive Index Formula</h3>
<div class="formula" style="font-size:15px;">n = Speed of light in air/vacuum ÷ Speed of light in the given medium</div>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Refractive Index Values (with respect to air)</h3>
<table class="data-table">
<tr><th>Medium</th><th>Refractive Index</th><th>Priority</th></tr>
<tr><td>Air</td><td>1.00</td><td><span class="tag tag-good">Good to Know</span></td></tr>
<tr><td>Ice</td><td>1.3</td><td><span class="tag tag-good">Good to Know</span></td></tr>
<tr><td>Water</td><td>1.33</td><td><span class="tag tag-good">Good to Know</span></td></tr>
<tr><td>Alcohol</td><td>1.36</td><td><span class="tag tag-good">Good to Know</span></td></tr>
<tr><td class="hl">Benzene</td><td class="hl">1.5</td><td><span class="tag tag-must">Must Know</span></td></tr>
<tr><td class="hl">Crown Glass</td><td class="hl">1.52</td><td><span class="tag tag-must">Must Know</span></td></tr>
<tr><td class="hl">Canada Balsam</td><td class="hl">1.53</td><td><span class="tag tag-must">Must Know</span></td></tr>
<tr><td class="hl" style="color:var(--amber)">Diamond</td><td class="hl" style="color:var(--amber)">2.42</td><td><span class="tag tag-must">Must Know · Most Asked</span></td></tr>
</table>
</div>

<div class="hook-box">
<div class="hook-title">🔑 MEMORY HOOK: The Climbing Staircase</div>
<p>Benzene (1.50) → Crown Glass (1.52) → Canada Balsam (1.53) climb up in tiny, easy 0.01–0.02 steps — like a staircase with shallow steps. Memorize just <b>Benzene = 1.5</b> firmly, and the next two practically follow themselves (+0.02, +0.01). Then <b>Diamond jumps way up to 2.42</b> — the staircase suddenly becomes a cliff. That jump IS the memory hook: diamond doesn't belong on the staircase, it's in its own league, and that's exactly why it's the most-asked value.</p>
</div>

<div class="card">
<h3>⚡ Connected Fact: Why You See Lightning Before You Hear Thunder</h3>
<p>Speed of light = 3 × 10⁸ m/s. Speed of sound ≈ 343 m/s. Light is drastically faster, so during a storm you <b>see the flash first, hear the thunder later</b> — same event, different arrival times due to speed difference.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP</div>
<p>Don't confuse the <b>law of reflection's two laws</b> with the <b>law of refraction's two laws</b> — they share an identical "same plane" rule but differ in the second law (angle equality for reflection vs. constant sine ratio for refraction).</p>
</div>
`);

/* ============ 10. GLASS SLAB ============ */
addPage("glass-slab","Complete Notes","Refraction Through Glass Slab","🪟","var(--green)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--green)">COMPLETE REVISION NOTES · 8</div>
  <h1 class="page-title">Refraction Through a Glass Slab</h1>
  <p class="page-desc">Two refractions in a row — entering and exiting — that cancel each other's bend but not the shift.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Step by Step</h3>
<ol>
<li>Incident ray travels in <b>air</b>, hits the glass slab. Air → Glass = rarer → denser, so it <b>bends toward the normal</b> (drawn at the entry point) and slows down.</li>
<li>Inside the glass, the ray travels straight until it reaches the far side.</li>
<li>At the far side, it goes from <b>glass → air</b> = denser → rarer, so it <b>bends away from the normal</b> (drawn at the exit point) and speeds back up.</li>
<li>The ray that comes out (<b>emergent ray</b>) is <b>parallel</b> to the original incident ray, but <b>shifted sideways</b>. This sideways shift is called <b>lateral displacement</b>.</li>
</ol>
</div>

<div class="diagram-box">
<svg viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg">
<rect x="150" y="20" width="160" height="160" fill="#1a1e29" stroke="#262b3a" stroke-width="1.5"/>
<text x="195" y="100" fill="#6b7280" font-size="13" font-family="sans-serif">GLASS</text>
<line x1="20" y1="60" x2="150" y2="90" stroke="#7ec8f0" stroke-width="2.5"/>
<polygon points="150,90 134,84 140,94" fill="#7ec8f0"/>
<text x="25" y="50" fill="#7ec8f0" font-size="11" font-family="sans-serif">Incident ray</text>
<line x1="150" y1="90" x2="150" y2="40" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="150" y1="90" x2="310" y2="130" stroke="#7ee3a8" stroke-width="2.5"/>
<line x1="310" y1="130" x2="310" y2="80" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="310" y1="130" x2="440" y2="160" stroke="#f0c674" stroke-width="2.5"/>
<polygon points="440,160 424,156 428,166" fill="#f0c674"/>
<text x="350" y="178" fill="#f0c674" font-size="11" font-family="sans-serif">Emergent ray</text>
</svg>
<div class="diagram-cap">Bends toward normal entering glass, away from normal exiting — emergent ray parallel to incident, shifted (lateral displacement)</div>
</div>

<div class="hook-box">
<div class="hook-title">🔑 MEMORY HOOK</div>
<p>Picture pushing a shopping trolley from a smooth tile floor (air) onto thick carpet (glass) at an angle — the wheel that hits the carpet first slows down and the trolley swerves <b>toward</b> the carpet boundary's perpendicular. When it rolls back off the carpet onto tiles, the wheel speeds up again and it swerves <b>away</b> — but because both swerves are mirror images of each other, the trolley ends up moving in its <b>original direction</b>, just shifted sideways from its original path.</p>
</div>

<div class="card">
<h3><span class="tag tag-imp">IMPORTANT</span> The 90° Special Case</h3>
<p>If the angle of incidence is <b>exactly 90°</b> to the surface (i.e., the ray hits perpendicular / straight-on), it passes through <b>without any bending at all</b> — straight through, no refraction, no lateral displacement.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP</div>
<p>"Without refraction" at 90° incidence does NOT mean light doesn't slow down inside the glass — it still changes speed. It just doesn't <b>change direction</b>, because there's no bending when the ray is perpendicular to the surface.</p>
</div>
`);

/* ============ 11. LENSES ============ */
addPage("lenses","Complete Notes","Lenses — The Mirror-Lens Analogy","🔮","var(--green)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--green)">COMPLETE REVISION NOTES · 9</div>
  <h1 class="page-title">Convex & Concave Lenses</h1>
  <p class="page-desc">Everything you already know about mirrors, recycled — with one critical twist.</p>
</div>

<div class="hook-box">
<div class="hook-title">🔑 THE MASTER EQUIVALENCE</div>
<p style="font-size:15px;"><b>Concave Mirror ⟺ Convex Lens</b> (identical image-formation behaviour across all 6 object positions)</p>
<p style="font-size:15px;"><b>Convex Mirror ⟺ Concave Lens</b> (identical image-formation behaviour across both object positions)</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Shape Identification</h3>
<table class="data-table">
<tr><th>Lens</th><th>Shape</th><th>Nature</th><th>Used for</th></tr>
<tr><td class="hl">Convex Lens</td><td>Thick in the middle, thin at the edges</td><td>Converging</td><td>Hypermetropia (long-sightedness)</td></tr>
<tr><td class="hl-blue">Concave Lens</td><td>Thin in the middle, thick at the edges</td><td>Diverging</td><td>Myopia (short-sightedness)</td></tr>
</table>
</div>

<div class="card">
<h3>📊 Convex Lens — Image Formation (= Concave Mirror's table)</h3>
<table class="data-table">
<tr><th>Object Position</th><th>Image Position</th><th>Nature</th><th>Size</th></tr>
<tr><td>At Infinity</td><td>At Focus (F)</td><td>Real, Inverted</td><td>Highly diminished</td></tr>
<tr><td>Beyond 2F</td><td>Between F and 2F</td><td>Real, Inverted</td><td>Diminished</td></tr>
<tr><td>At 2F</td><td>At 2F</td><td>Real, Inverted</td><td>Same size</td></tr>
<tr><td>Between F and 2F</td><td>Beyond 2F</td><td>Real, Inverted</td><td>Enlarged</td></tr>
<tr><td>At Focus (F)</td><td>At Infinity</td><td>Real, Inverted</td><td>Highly enlarged</td></tr>
<tr><td style="color:var(--amber)">Between O and F</td><td style="color:var(--amber)">Same side as object</td><td style="color:var(--amber)">★ Virtual, Erect (EXCEPTION)</td><td style="color:var(--amber)">Enlarged</td></tr>
</table>
<p style="font-size:13px;color:var(--text-faint)">Note: "O" (optical centre) plays the same structural role here as "P" (pole) does for mirrors.</p>
</div>

<div class="card">
<h3>📊 Concave Lens — Image Formation (= Convex Mirror's table)</h3>
<table class="data-table">
<tr><th>Object Position</th><th>Image Position</th><th>Nature</th><th>Size</th></tr>
<tr><td>At Infinity</td><td>At Focus</td><td>Virtual, Erect</td><td>Highly diminished</td></tr>
<tr><td>Between Infinity and O</td><td>Between O and F</td><td>Virtual, Erect</td><td>Diminished</td></tr>
</table>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP #1 — THE BIGGEST ONE IN THIS CHAPTER</div>
<p>Students assume: "concave mirror's f was negative, so by the equivalence, convex lens's f must be positive." <b>WRONG.</b> Sign convention follows <b>SHAPE</b>, never the mirror/lens identity:</p>
<ul>
<li><b>Concave</b> (mirror OR lens) → focal length is <b>always negative</b></li>
<li><b>Convex</b> (mirror OR lens) → focal length is <b>always positive</b></li>
</ul>
<p>So a convex lens has a <b>positive</b> f (matching its own shape) even though it behaves like a concave mirror (which has negative f).</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠️ EXAM TRAP #2 — "Real" Flips Sides</div>
<p>For mirrors: image on the <b>same side as the object</b> = real. For lenses: image on the <b>opposite side</b> of the lens from the object = real. This is because light actually passes through a lens but bounces off a mirror.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Lens Formula & Magnification</h3>
<div class="formula" style="font-size:16px;">1/v − 1/u = 1/f &nbsp; (note the MINUS, vs. PLUS for mirrors)</div>
<div class="formula" style="font-size:16px;">m = Height of image / Height of object = +v/u &nbsp; (note: NO minus sign, vs. mirror's −v/u)</div>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Sign Convention Flip for v</h3>
<table class="data-table">
<tr><th>v is positive</th><th>Mirror</th><th>Lens</th></tr>
<tr><td>Meaning</td><td class="hl-blue">Virtual</td><td class="hl">Real</td></tr>
</table>
<p style="color:var(--amber)">This is the ONLY thing that flips between mirror and lens Cartesian systems. Everything else (u always negative, concave=negative f, convex=positive f) stays identical.</p>
</div>

<div class="card">
<h3><span class="tag tag-must">MUST KNOW</span> Power of a Lens</h3>
<div class="formula">P = 1 / f (f in metres)</div>
<p>SI unit: <b>Diopter (D)</b>, also called metre-inverse (m⁻¹). This is NOT the same "power" as electrical power (watts) or horsepower — it's the lens's light-bending capacity.</p>
<ul>
<li>Concave lens → negative focal length → <b>negative power</b></li>
<li>Convex lens → positive focal length → <b>positive power</b></li>
<li>Combination of lenses: <b>P = P₁ + P₂ + P₃ + ...</b> (simple addition, signs included)</li>
</ul>
</div>
`);

/* ============ 14. EXAM TRAPS (consolidated) ============ */
addPage("exam-traps","Retention Tools","⚠ Exam Traps","⚠️","var(--red)",`
<div class="page-header">
  <div class="page-eyebrow" style="color:var(--red)">RETENTION TOOLS</div>
  <h1 class="page-title">⚠️ Exam Traps — All Confusions in One Place</h1>
  <p class="page-desc">Everything students get wrong, gathered for a final sweep before the exam.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 1 — Angle measured from where?</div>
<p>Angle of incidence/reflection/refraction is ALWAYS measured from the <b>NORMAL</b>, never from the surface itself.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 2 — Lateral inversion ≠ inverted image</div>
<p>Lateral inversion is a LEFT-RIGHT flip (seen in plane mirrors). "Inverted" means UPSIDE-DOWN. A plane mirror image is laterally inverted but still erect (not upside down) — these are two separate properties.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 3 — Inner/outer vs curved inward/outward phrasing</div>
<p>Questions describe mirrors as having a reflecting surface "curved outward" (= convex) or "curved inward" (= concave) — NOT as "inner surface" or "outer surface." Translate the phrasing correctly.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 4 — The ONE exception in concave mirror</div>
<p>5 of 6 concave mirror cases give real+inverted images. The exception (object between P and F) gives virtual+erect+magnified. Forgetting this exception is the #1 mistake in this chapter.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 5 — Convex mirror has ZERO real/inverted cases</div>
<p>Unlike concave, convex mirror NEVER produces a real or inverted image, in any object position. If a question says "real, inverted image," it can never be a convex mirror.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 6 — Sign convention follows SHAPE, not mirror/lens identity</div>
<p>The biggest trap in the chapter. Concave mirror's f is negative — this does NOT mean convex lens's f is positive "because it's the opposite mirror." Convex lens's f is positive because it is <b>convex</b>, full stop. Shape decides sign; mirror/lens identity decides image-position behaviour. These are two completely separate rules.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 7 — "Real" sits on different sides for mirrors vs lenses</div>
<p>Mirror: real image forms on the <b>same side</b> as the object (light bounces back). Lens: real image forms on the <b>opposite side</b> of the object (light passes through). Same word "real," different geometry.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 8 — Positive v means different things for mirror vs lens</div>
<p>Mirror: v positive = virtual. Lens: v positive = real. This is the ONLY sign-convention rule that flips between the two systems — everything else (u always negative, concave f negative, convex f positive) stays the same.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 9 — Magnification formula sign differs too</div>
<p>Mirror: m = −v/u (minus sign present). Lens: m = +v/u (no minus sign). Mixing these up flips your final answer's sign.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 10 — Refractive index values that sit close together</div>
<p>Benzene (1.50), Crown Glass (1.52), Canada Balsam (1.53) are easy to swap in memory because they're so close. Anchor Benzene first, then add 0.02 then 0.01.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 11 — Mirror formula sign vs Lens formula sign</div>
<p>Mirror formula: 1/v + 1/u = 1/f (PLUS). Lens formula: 1/v − 1/u = 1/f (MINUS). Don't transplant one formula's operator into the other.</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 12 — 90° incidence still changes speed</div>
<p>At 90° incidence on a glass slab, there's no bending (no direction change) — but the light still slows down inside the glass and speeds up on exit. "No refraction" here means "no bending," not "no speed change."</p>
</div>

<div class="trap-box">
<div class="trap-title">⚠ TRAP 13 — Power unit "Diopter" vs other "power" units</div>
<p>Lens power's unit is Diopter (D) / m⁻¹. Don't confuse with electrical power (Watt) or horsepower — completely different physical quantities sharing the English word "power."</p>
</div>
`);

<div class="page-header">
  <div class="page-eyebrow" style="color:var(--amber)">LAYER 2 · HIGH-YIELD REVISION</div>
  <h1 class="page-title">⭐ High-Yield Revision Notes</h1>

</div>

<div class="layer-section">
<h2>📐 Reflection</h2>
<ul>
<li>∠i = ∠r; incident, reflected ray & normal — same plane.</li>
<li>Plane mirror: P=0, f=∞, virtual, erect, same size & distance. Lateral inversion = L↔R flip.</li>
<li><b>Virtual ⟺ Erect | Real ⟺ Inverted</b> — unbreakable pair, no exceptions (mirrors).</li>
</ul>
</div>

<div class="layer-section">
<h2>🔵 Spherical Mirrors</h2>
<ul>
<li>Convex = curved outward (reflecting surface) | Concave = curved inward.</li>
<li>C = 2F. Pole→Focus→Centre of Curvature, in that order along principal axis.</li>
<li><b>Concave (6 cases):</b> ∞→F, beyond C→F-C, at C→C, C-F→beyond C, F→∞ — ALL real+inverted, sizes go: tiny→small→same→big→huge. EXCEPTION: P-F → virtual, erect, enlarged.</li>
<li><b>Convex (2 cases):</b> ∞→F(behind), ∞-to-P→P-F(behind) — both virtual, erect, diminished. NEVER real/inverted.</li>
<li>Uses: Concave = magnify (shaving, dentist, torch, solar). Convex = wide view (vehicles, ATM, sunglasses, street lights).</li>
</ul>
</div>

<div class="layer-section">
<h2>➗ Mirror Formula</h2>
<ul>
<li>1/v + 1/u = 1/f. u always negative. Concave f negative, Convex f positive.</li>
<li>v positive = virtual (behind mirror). v negative = real (in front).</li>
<li>m = −v/u</li>
</ul>
</div>

<div class="layer-section">
<h2>🌊 Refraction</h2>
<ul>
<li>Rarer→Denser: bends toward normal, slows down. Denser→Rarer: bends away, speeds up.</li>
<li>Snell's Law: sin i / sin r = constant = refractive index.</li>
<li>n = speed in air ÷ speed in medium.</li>
<li>Must-know n values: Benzene 1.5, Crown Glass 1.52, Canada Balsam 1.53, Diamond 2.42.</li>
<li>Glass slab: bends toward normal entering, away exiting → emergent ray parallel but laterally displaced. At 90° incidence: no bending at all.</li>
</ul>
</div>

<div class="layer-section">
<h2>🔮 Lenses</h2>
<ul>
<li>Concave Mirror ⟺ Convex Lens. Convex Mirror ⟺ Concave Lens (image-position behaviour only).</li>
<li>Sign convention follows SHAPE not identity: Concave (mirror/lens) = f negative. Convex (mirror/lens) = f positive.</li>
<li>For lenses: real image = opposite side of object (vs. same side for mirrors).</li>
<li>v positive = REAL for lens (flips from mirror's virtual meaning).</li>
<li>Lens formula: 1/v − 1/u = 1/f (minus). m = +v/u (no minus).</li>
<li>Convex lens = converging, treats hypermetropia. Concave lens = diverging, treats myopia.</li>
<li>Power P = 1/f, unit Diopter. Convex = +P, Concave = −P. Combine: P = P₁+P₂+...</li>
</ul>
</div>
`);
