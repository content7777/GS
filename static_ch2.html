<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classical Dances of India — The Temple Hall Memory System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg: #0f1117;
  --bg-deep: #0a0b10;
  --surface: #161922;
  --surface-2: #1c2029;
  --border: #262b36;
  --text: #e6e8eb;
  --muted: #8b939e;
  --green: #7ee787;
  --green-dim: #4f8f5a;
  --blue: #79c0ff;
  --blue-dim: #4a7aa8;
  --amber: #ffa657;
  --amber-dim: #cc8444;
  --pink: #ff9bce;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --radius: 10px;
  --sidebar-w: 280px;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html, body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  height: 100%;
  scroll-behavior: smooth;
}

body{
  display:flex;
  min-height:100vh;
  background-image:
    radial-gradient(circle at 10% 0%, rgba(126,231,135,0.05), transparent 40%),
    radial-gradient(circle at 90% 100%, rgba(121,192,255,0.05), transparent 40%);
}

a{ color: inherit; text-decoration:none; }
button{ font-family: inherit; cursor:pointer; }

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background: var(--bg-deep); }
::-webkit-scrollbar-thumb{ background: var(--surface-2); border-radius:6px; }
::-webkit-scrollbar-thumb:hover{ background: var(--border); }

/* ============ SIDEBAR : THE TEMPLE HALLWAY ============ */
.sidebar{
  width: var(--sidebar-w);
  flex-shrink:0;
  background: linear-gradient(180deg, var(--bg-deep), #0c0e14);
  border-right: 1px solid var(--border);
  position: fixed;
  top:0; left:0; bottom:0;
  overflow-y:auto;
  z-index: 50;
  display:flex;
  flex-direction:column;
  transition: transform 0.3s ease;
}

.sidebar-header{
  padding: 22px 20px 16px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header .eyebrow{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--green);
  text-transform: uppercase;
  display:block;
  margin-bottom:6px;
}

.sidebar-header h1{
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  line-height:1.3;
  color: var(--text);
}

.sidebar-header .sub{
  font-size: 11px;
  color: var(--muted);
  margin-top:6px;
  line-height:1.5;
}

.hall-progress{
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.hall-progress-bar{
  height:4px;
  background: var(--surface);
  border-radius:4px;
  overflow:hidden;
}
.hall-progress-fill{
  height:100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  width:0%;
  transition: width 0.4s ease;
  border-radius:4px;
}
.hall-progress-label{
  font-size:10px;
  color:var(--muted);
  margin-top:6px;
  font-family: var(--font-mono);
}

.nav-group{
  padding: 14px 14px 6px 14px;
}
.nav-group-label{
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 10px 8px 10px;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding: 10px 12px;
  margin-bottom: 3px;
  border-radius: 8px;
  font-size: 13.5px;
  color: var(--muted);
  position:relative;
  transition: background 0.15s, color 0.15s;
  border: 1px solid transparent;
}
.nav-item:hover{
  background: var(--surface);
  color: var(--text);
}
.nav-item.active{
  background: var(--surface-2);
  color: var(--green);
  border-color: var(--green-dim);
}
.nav-item.active .nav-icon{ opacity:1; }
.nav-icon{
  width:18px; height:18px;
  flex-shrink:0;
  opacity:0.7;
  display:flex;
  align-items:center;
  justify-content:center;
}
.nav-icon svg{ width:100%; height:100%; }
.nav-item .door-num{
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  background: var(--bg-deep);
  border-radius:4px;
  padding:1px 5px;
  margin-left:auto;
}
.nav-item.active .door-num{ color: var(--green); }

.sidebar-footer{
  margin-top:auto;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  font-size: 10.5px;
  color: var(--muted);
  font-family: var(--font-mono);
  line-height:1.6;
}

/* mobile hamburger */
.menu-toggle{
  display:none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 100;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 42px; height:42px;
  align-items:center;
  justify-content:center;
  color: var(--green);
}
.menu-toggle svg{ width:20px; height:20px; }

.overlay{
  display:none;
  position:fixed; inset:0;
  background: rgba(0,0,0,0.5);
  z-index:40;
}

/* ============ MAIN ============ */
.main{
  margin-left: var(--sidebar-w);
  flex:1;
  min-width:0;
  padding: 36px 48px 90px 48px;
  max-width: 1000px;
}

.page{ display:none; animation: fadeUp 0.35s ease; }
.page.active{ display:block; }

@keyframes fadeUp{
  from{ opacity:0; transform: translateY(8px); }
  to{ opacity:1; transform: translateY(0); }
}

/* page header */
.page-eyebrow{
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 10px;
  display:flex;
  align-items:center;
  gap:10px;
}
.page-eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--green); }

.page-title{
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 600;
  line-height:1.15;
  margin-bottom: 8px;
  background: linear-gradient(90deg, var(--text), var(--text));
  background-clip:text;
}
.page-title .accent{ color: var(--green); }
.page-subtitle{
  color: var(--muted);
  font-size: 14.5px;
  margin-bottom: 28px;
  max-width: 640px;
  line-height:1.6;
}

/* section card */
.card{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 20px;
}
.card h3{
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  margin-bottom: 12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card p{ font-size: 14px; line-height:1.7; color: var(--text); margin-bottom:10px; }
.card ul, .card ol{ margin-left: 20px; margin-bottom: 10px; }
.card li{ font-size: 14px; line-height:1.75; margin-bottom:6px; }
.card li::marker{ color: var(--green); }

.tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 2px 8px;
  border-radius: 5px;
  font-weight:600;
  vertical-align:middle;
  white-space:nowrap;
}
.tag-must{ background: rgba(126,231,135,0.12); color: var(--green); border:1px solid var(--green-dim); }
.tag-imp{ background: rgba(121,192,255,0.12); color: var(--blue); border:1px solid var(--blue-dim); }
.tag-good{ background: rgba(255,166,87,0.1); color: var(--amber); border:1px solid var(--amber-dim); }
.tag-trap{ background: rgba(255,107,107,0.12); color: #ff8b8b; border:1px solid #a85050; }

/* memory hook box */
.hook-box{
  background: linear-gradient(135deg, rgba(126,231,135,0.06), rgba(121,192,255,0.04));
  border: 1px dashed var(--green-dim);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin: 14px 0;
}
.hook-box .hook-label{
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color: var(--green);
  margin-bottom: 8px;
  display:block;
}
.hook-box p{ font-size: 14.5px; line-height:1.8; color: var(--text); }
.hook-box .hi{ color: var(--blue); font-weight:600; }
.hook-box .hi2{ color: var(--green); font-weight:600; }

/* trap box */
.trap-box{
  background: rgba(255,107,107,0.06);
  border-left: 3px solid #ff6b6b;
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 14px 18px;
  margin: 12px 0;
}
.trap-box .trap-label{
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color: #ff8b8b;
  margin-bottom: 6px;
  display:block;
}
.trap-box p{ font-size: 13.5px; line-height:1.7; }

/* table */
.tbl{ width:100%; border-collapse: collapse; margin: 14px 0; font-size: 13.5px; }
.tbl th{
  text-align:left;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color: var(--blue);
  padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  background: var(--surface-2);
}
.tbl td{
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align:top;
}
.tbl tr:last-child td{ border-bottom:none; }
.tbl tr:hover td{ background: rgba(255,255,255,0.015); }

/* grid layouts */
.grid-2{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
.grid-3{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px; }
@media (max-width: 760px){ .grid-2, .grid-3{ grid-template-columns: 1fr; } }

.stat-chip{
  background: var(--surface-2);
  border:1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  text-align:center;
}
.stat-chip .num{ font-family: var(--font-display); font-size: 26px; color: var(--green); font-weight:600; }
.stat-chip .lbl{ font-size:11px; color:var(--muted); margin-top:4px; }

/* flashcard / accordion for active recall */
.flip-card{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor:pointer;
  transition: border-color 0.2s;
}
.flip-card:hover{ border-color: var(--green-dim); }
.flip-card .q{ font-size: 14px; color: var(--blue); font-weight:600; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.flip-card .q .chevron{ transition: transform 0.2s; color:var(--muted); flex-shrink:0; }
.flip-card.open .q .chevron{ transform: rotate(180deg); }
.flip-card .a{
  font-size: 13.5px;
  color: var(--text);
  margin-top:0;
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;
  line-height:1.7;
}
.flip-card.open .a{ max-height: 600px; opacity:1; margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); }

/* fill in blank */
.blank{
  border-bottom: 2px solid var(--blue);
  color: transparent;
  background: var(--surface-2);
  border-radius:3px;
  padding: 0 4px;
  font-weight:600;
  cursor:pointer;
  transition: color 0.15s, background 0.15s;
  user-select:none;
}
.blank.revealed{
  color: var(--green);
  background: transparent;
}

/* timeline */
.timeline{ position:relative; padding-left: 28px; margin: 16px 0; }
.timeline::before{
  content:'';
  position:absolute; left:6px; top:4px; bottom:4px;
  width:2px;
  background: linear-gradient(180deg, var(--green), var(--blue));
}
.t-item{ position:relative; margin-bottom:18px; }
.t-item::before{
  content:'';
  position:absolute; left:-28px; top:3px;
  width:12px; height:12px;
  border-radius:50%;
  background: var(--bg);
  border: 2px solid var(--green);
}
.t-item .yr{ font-family: var(--font-mono); color: var(--green); font-size:13px; font-weight:700; }
.t-item p{ font-size: 13.5px; color: var(--text); margin-top:2px; }

/* palace map */
.palace-wrap{
  background: radial-gradient(circle at 50% 0%, rgba(121,192,255,0.07), transparent 60%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px;
  margin: 16px 0;
}
.palace-room{
  border-left: 2px solid var(--green-dim);
  padding-left: 18px;
  margin-bottom: 18px;
  position:relative;
}
.palace-room::before{
  content:'';
  position:absolute; left:-6px; top:2px;
  width:10px; height:10px;
  background: var(--green);
  border-radius:50%;
  box-shadow: 0 0 8px var(--green);
}
.palace-room h4{ font-family: var(--font-display); color: var(--blue); font-size:15.5px; margin-bottom:4px; }
.palace-room p{ font-size:13.5px; color:var(--text); line-height:1.7; }

/* speed sheet */
.speed-grid{
  display:grid;
  grid-template-columns: 140px 1fr;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow:hidden;
  margin: 14px 0;
}
.speed-grid > div{ padding:10px 14px; font-size:13px; border-bottom:1px solid var(--border); }
.speed-grid > div:nth-child(odd){ background: var(--surface-2); color: var(--blue); font-family:var(--font-mono); font-size:11.5px; font-weight:600; display:flex; align-items:center;}
.speed-grid > div:nth-child(even){ background: var(--surface); color: var(--text); }
.speed-grid > div:last-child, .speed-grid > div:nth-last-child(2){ border-bottom:none; }

/* last night sheet - big punchy */
.punch{
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--green);
  padding: 10px 0;
  border-bottom: 1px dashed var(--border);
}
.punch:last-child{ border-bottom:none; }
.punch .num-label{ color: var(--blue); font-family: var(--font-mono); font-size:12px; margin-right:8px;}

/* nav between pages bottom */
.page-nav-footer{
  display:flex;
  justify-content:space-between;
  margin-top: 36px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  gap:12px;
}
.pn-btn{
  display:flex;
  align-items:center;
  gap:8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text);
  transition: border-color 0.2s, color 0.2s;
}
.pn-btn:hover{ border-color: var(--green-dim); color: var(--green); }
.pn-btn .lbl{ color: var(--muted); font-size:10.5px; display:block; font-family:var(--font-mono); }
.pn-btn.next{ margin-left:auto; text-align:right; }

/* section divider label inside a hall page (sub-nav pills) */
.subnav{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom: 26px;
  position: sticky;
  top:0;
  background: var(--bg);
  padding: 10px 0;
  z-index:5;
}
.subnav button{
  background: var(--surface);
  border:1px solid var(--border);
  color: var(--muted);
  border-radius:20px;
  padding: 7px 14px;
  font-size:12px;
  font-family: var(--font-body);
  transition: all 0.15s;
}
.subnav button:hover{ color:var(--text); border-color:var(--green-dim); }
.subnav button.active-sub{ background: var(--green); color: #0a0f0a; border-color:var(--green); font-weight:600; }

.layer-section{ display:none; }
.layer-section.active-layer{ display:block; animation: fadeUp 0.3s ease; }

.lotus-divider{
  text-align:center;
  color: var(--border);
  font-size: 18px;
  margin: 28px 0;
  letter-spacing: 12px;
}

/* responsive */
@media (max-width: 880px){
  .sidebar{ transform: translateX(-100%); }
  .sidebar.open{ transform: translateX(0); }
  .main{ margin-left:0; padding: 80px 18px 70px 18px; }
  .menu-toggle{ display:flex; }
  .overlay.show{ display:block; }
  .page-title{ font-size: 28px; }
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle" aria-label="Open navigation">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="overlay" id="overlay"></div>

<!-- ============ SIDEBAR (placeholder, filled below) ============ -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">

  </div>

    <div class="hall-progress-bar"><div class="hall-progress-fill" id="progressFill"></div></div>
    <div class="hall-progress-label" id="progressLabel">0 / 0 rooms visited</div>
  </div>
  <div id="navContainer" style="flex:1; overflow-y:auto;"></div>
  <div class="sidebar-footer">
    🪔 8 dances, 1 long hallway.<br>Revise until you can walk it with your eyes closed.
  </div>
</nav>

<main class="main" id="mainArea"></main>

let allPageIds = [];
NAV_GROUPS.forEach(g => g.items.forEach(i => allPageIds.push(i.id)));
let visitedPages = new Set();

/* =========================================================
   BUILD SIDEBAR
   ========================================================= */
const navContainer = document.getElementById('navContainer');
NAV_GROUPS.forEach(group => {
  const groupLabel = document.createElement('div');
  groupLabel.className = 'nav-group-label';
  groupLabel.textContent = group.label;
  const groupWrap = document.createElement('div');
  groupWrap.className = 'nav-group';
  groupWrap.appendChild(groupLabel);
  group.items.forEach((item, idx) => {
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.href = '#' + item.id;
    a.dataset.page = item.id;
    a.innerHTML = '<span class="nav-icon">' + ICONS[item.icon] + '</span><span>' + item.title + '</span>';
    a.addEventListener('click', (e) => { e.preventDefault(); goToPage(item.id); closeSidebarMobile(); });
    groupWrap.appendChild(a);
  });
  navContainer.appendChild(groupWrap);
});

function updateProgress(){
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const pct = Math.round((visitedPages.size / allPageIds.length) * 100);
  fill.style.width = pct + '%';
  label.textContent = visitedPages.size + ' / ' + allPageIds.length + ' rooms visited';
}

function setActiveNav(pageId){
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageId);
  });
}

/* mobile sidebar toggle */
const sidebarEl = document.getElementById('sidebar');
const overlayEl = document.getElementById('overlay');
document.getElementById('menuToggle').addEventListener('click', () => {
  sidebarEl.classList.add('open');
  overlayEl.classList.add('show');
});
overlayEl.addEventListener('click', closeSidebarMobile);
function closeSidebarMobile(){
  sidebarEl.classList.remove('open');
  overlayEl.classList.remove('show');
}

/* =========================================================
   PAGE ROUTER
   ========================================================= */
const mainArea = document.getElementById('mainArea');

function goToPage(pageId){
  if(!PAGES[pageId]) return;
  mainArea.innerHTML = PAGES[pageId]();
  mainArea.scrollTop = 0;
  window.scrollTo(0,0);
  setActiveNav(pageId);
  visitedPages.add(pageId);
  updateProgress();
  window.location.hash = pageId;
  initPageWidgets();
  attachFooterNav(pageId);
}

function attachFooterNav(pageId){
  const idx = allPageIds.indexOf(pageId);
  const prevId = idx > 0 ? allPageIds[idx-1] : null;
  const nextId = idx < allPageIds.length - 1 ? allPageIds[idx+1] : null;
  const prevBtn = document.getElementById('btnPrevPage');
  const nextBtn = document.getElementById('btnNextPage');
  if(prevBtn){
    if(prevId){ prevBtn.style.visibility='visible'; prevBtn.querySelector('.lbl-text').textContent = labelFor(prevId); prevBtn.onclick = () => goToPage(prevId); }
    else { prevBtn.style.visibility='hidden'; }
  }
  if(nextBtn){
    if(nextId){ nextBtn.style.visibility='visible'; nextBtn.querySelector('.lbl-text').textContent = labelFor(nextId); nextBtn.onclick = () => goToPage(nextId); }
    else { nextBtn.style.visibility='hidden'; }
  }
}
function labelFor(id){
  for(const g of NAV_GROUPS){ for(const i of g.items){ if(i.id===id) return i.title; } }
  return id;
}

function footerNav(){
  return '<div class="page-nav-footer">'
    + '<button class="pn-btn" id="btnPrevPage"><span><span class="lbl">PREVIOUS HALL</span><span class="lbl-text"></span></span></button>'
    + '<button class="pn-btn next" id="btnNextPage"><span><span class="lbl">NEXT HALL</span><span class="lbl-text"></span></span></button>'
    + '</div>';
}

/* =========================================================
   WIDGET LOGIC (tabs, flip cards, blanks)
   ========================================================= */
function initPageWidgets(){
  document.querySelectorAll('.subnav').forEach(nav => {
    const buttons = nav.querySelectorAll('button');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.target;
        const scope = nav.closest('.page');
        scope.querySelectorAll('.layer-section').forEach(s => s.classList.remove('active-layer'));
        scope.querySelector('#' + target).classList.add('active-layer');
        buttons.forEach(b => b.classList.remove('active-sub'));
        btn.classList.add('active-sub');
      });
    });
  });

  document.querySelectorAll('.flip-card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('open'));
  });

  document.querySelectorAll('.blank').forEach(b => {
    b.addEventListener('click', () => b.classList.toggle('revealed'));
  });
}
