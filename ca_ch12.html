<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>June Current Affairs — SSC CGL Study Companion</title>
<style>
  :root{
    --bg:#10141a;
    --bg-soft:#151a22;
    --surface:#1a212b;
    --surface-2:#212938;
    --border:#2a3242;
    --border-soft:#232b38;
    --text:#e9e6dd;
    --text-dim:#a3aebc;
    --text-faint:#697484;
    --sage:#82ab97;
    --sage-soft:rgba(130,171,151,0.13);
    --sage-line:rgba(130,171,151,0.35);
    --gold:#cda86e;
    --gold-soft:rgba(205,168,110,0.14);
    --gold-line:rgba(205,168,110,0.45);
    --serif:Georgia,'Iowan Old Style','Palatino Linotype','Book Antiqua',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(130,171,151,0.06), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(205,168,110,0.04), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--sage-soft); color:var(--text); }
  a{color:inherit;}

  /* ---------- Layout shell ---------- */
  .shell{
    display:flex;
    min-height:100vh;
  }

  /* ---------- Sidebar (book-spine chapter tabs) ---------- */
  .sidebar{
    width:270px;
    flex-shrink:0;
    background:var(--bg-soft);
    border-right:1px solid var(--border-soft);
    display:flex;
    flex-direction:column;
    position:sticky;
    top:0;
    height:100vh;
  }
  .brand{
    padding:26px 22px 18px 22px;
    border-bottom:1px solid var(--border-soft);
  }
  .brand .eyebrow{
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--sage);
    font-weight:600;
    margin-bottom:6px;
  }
  .brand h1{
    font-family:var(--serif);
    font-size:22px;
    font-weight:600;
    margin:0 0 4px 0;
    line-height:1.25;
    color:var(--text);
  }
  .brand p{
    margin:0;
    font-size:12.5px;
    color:var(--text-faint);
  }

  .chapters{
    flex:1;
    overflow-y:auto;
    padding:14px 10px 14px 10px;
  }
  .chapters::-webkit-scrollbar{width:6px;}
  .chapters::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  .chapter-tab{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    color:var(--text-dim);
    padding:10px 12px;
    border-radius:9px;
    cursor:pointer;
    font-family:var(--sans);
    font-size:13.5px;
    margin-bottom:2px;
    position:relative;
    transition:background .15s ease,color .15s ease;
  }
  .chapter-tab:hover{ background:var(--surface); color:var(--text); }
  .chapter-tab .num{
    font-family:var(--serif);
    font-style:italic;
    font-size:13px;
    color:var(--text-faint);
    width:20px;
    flex-shrink:0;
  }
  .chapter-tab .label{ flex:1; line-height:1.3; }
  .chapter-tab .count{
    font-size:10.5px;
    color:var(--text-faint);
    background:var(--surface-2);
    padding:2px 6px;
    border-radius:20px;
    flex-shrink:0;
  }
  .chapter-tab.active{
    background:var(--surface-2);
    color:var(--text);
  }
  .chapter-tab.active .num{ color:var(--gold); }
  .chapter-tab.active::before{
    content:"";
    position:absolute;
    left:-10px; top:8px; bottom:8px;
    width:3px;
    border-radius:3px;
    background:var(--gold);
  }

  .sidebar-foot{
    padding:14px 22px 18px 22px;
    border-top:1px solid var(--border-soft);
    font-size:11px;
    color:var(--text-faint);
    line-height:1.5;
  }
  .legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}

  /* ---------- Main ---------- */
  .main{
    flex:1;
    min-width:0;
    padding:34px 44px 70px 44px;
  }
  .topbar{
    display:flex;
    gap:16px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:26px;
  }
  .search-wrap{
    position:relative;
    flex:1;
    min-width:220px;
    max-width:420px;
  }
  .search-wrap input{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    padding:11px 14px 11px 38px;
    border-radius:10px;
    font-size:13.5px;
    font-family:var(--sans);
    outline:none;
    transition:border-color .15s ease;
  }
  .search-wrap input:focus{ border-color:var(--sage-line); }
  .search-wrap input::placeholder{ color:var(--text-faint); }
  .search-wrap svg{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    opacity:.5;
  }

  .filter-toggle{
    display:flex;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:3px;
    gap:2px;
  }
  .filter-toggle button{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:12.5px;
    font-family:var(--sans);
    padding:7px 13px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
  }
  .filter-toggle button.active{
    background:var(--gold-soft);
    color:var(--gold);
  }

  .section-head{
    margin-bottom:22px;
  }
  .section-head .kicker{
    font-size:11px;
    letter-spacing:.13em;
    text-transform:uppercase;
    color:var(--sage);
    font-weight:600;
    margin-bottom:6px;
  }
  .section-head h2{
    font-family:var(--serif);
    font-size:30px;
    margin:0 0 6px 0;
    font-weight:600;
  }
  .section-head p{
    margin:0;
    color:var(--text-dim);
    font-size:13.5px;
    max-width:640px;
    line-height:1.5;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:16px;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-left:3px solid var(--sage-line);
    border-radius:12px;
    padding:18px 20px;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 26px rgba(0,0,0,0.28);
    border-color:var(--sage-line);
  }
  .card.high{ border-left-color:var(--gold-line); }
  .card.high:hover{ border-color:var(--gold-line); }

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:10px;
  }
  .card h3{
    font-family:var(--serif);
    font-size:16.5px;
    font-weight:600;
    margin:0;
    line-height:1.35;
    color:var(--text);
  }
  .badge{
    flex-shrink:0;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:.02em;
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
    background:var(--gold-soft);
    color:var(--gold);
    border:1px solid var(--gold-line);
  }
  .card ul{
    margin:0;
    padding-left:18px;
    color:var(--text-dim);
    font-size:13.2px;
    line-height:1.62;
  }
  .card ul li{ margin-bottom:4px; }
  .card ul li::marker{ color:var(--sage); }
  .card.high ul li::marker{ color:var(--gold); }
  .card ul li b, .card ul li strong{ color:var(--text); font-weight:600; }

  .no-results{
    text-align:center;
    padding:60px 20px;
    color:var(--text-faint);
    font-size:14px;
  }

  /* mobile */
  .mobile-nav-toggle{ display:none; }
  @media (max-width:900px){
    .shell{ flex-direction:column; }
    .sidebar{
      width:100%;
      height:auto;
      position:sticky;
      top:0;
      z-index:20;
      flex-direction:row;
      align-items:center;
    }
    .brand{ display:none; }
    .chapters{
      display:flex;
      flex-direction:row;
      overflow-x:auto;
      padding:10px;
      flex:1;
    }
    .chapter-tab{ flex-shrink:0; margin-right:6px; }
    .chapter-tab.active::before{ display:none; }
    .sidebar-foot{ display:none; }
    .main{ padding:22px 18px 60px 18px; }
    .section-head h2{ font-size:24px; }
    .grid{ grid-template-columns:1fr; }
  }
</style>
</head>

<div class="shell">

  <aside class="sidebar">
    <div class="brand">

  <main class="main">

        <input id="searchInput" type="text" placeholder="Search topics — e.g. Ramsar, G7, Maharatna…" />

      <div class="filter-toggle" id="filterToggle">

    <div class="section-head">

    </div>

    <div class="grid" id="grid"></div>
    <div class="no-results" id="noResults" style="display:none;">No facts match your search in this filter.</div>
  </main>
</div>

/* ============ RENDER ============ */
const chaptersEl = document.getElementById('chapters');
const gridEl = document.getElementById('grid');
const sectionTitleEl = document.getElementById('sectionTitle');
const sectionSubEl = document.getElementById('sectionSub');
const kickerEl = document.getElementById('kicker');
const noResultsEl = document.getElementById('noResults');
const searchInput = document.getElementById('searchInput');
const filterToggle = document.getElementById('filterToggle');

let activeSection = DATA[0].id;
let activeFilter = 'all';
let query = '';

function romanish(n){
  const r = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];
  return r[n-1] || n;
}

function buildSidebar(){
  chaptersEl.innerHTML = '';
  DATA.forEach((sec,i)=>{
    const highCount = sec.items.filter(it=>it.p==='h').length;
    const btn = document.createElement('button');
    btn.className = 'chapter-tab' + (sec.id===activeSection ? ' active' : '');
    btn.dataset.id = sec.id;
    btn.innerHTML = `<span class="num">${romanish(i+1)}</span><span class="label">${sec.title}</span><span class="count">${sec.items.length}</span>`;
    btn.addEventListener('click', ()=>{
      activeSection = sec.id;
      query = '';
      searchInput.value = '';
      buildSidebar();
      render();
      window.scrollTo({top:0, behavior:'smooth'});
    });
    chaptersEl.appendChild(btn);
  });
}

function cardHTML(item){
  const cls = item.p === 'h' ? 'card high' : 'card';
  const badge = item.p === 'h' ? '<span class="badge">🔥 High priority</span>' : '';
  return `<div class="${cls}">
    <div class="card-top"><h3>${item.t}</h3>${badge}</div>
    <ul>${item.pts.map(p=>`<li>${p}</li>`).join('')}</ul>
  </div>`;
}

function render(){
  gridEl.innerHTML = '';
  let itemsToShow = [];
  let title, sub, kicker;

  if(query.trim().length){
    kicker = 'Search results';
    title = `"${query.trim()}"`;
    sub = 'Matching facts across every chapter.';
    DATA.forEach(sec=>{
      sec.items.forEach(it=>{
        const haystack = (it.t + ' ' + it.pts.join(' ')).toLowerCase();
        if(haystack.includes(query.trim().toLowerCase())){
          itemsToShow.push(it);
        }
      });
    });
  } else {
    const sec = DATA.find(s=>s.id===activeSection);
    kicker = 'Chapter';
    title = sec.title;
    sub = sec.sub;
    itemsToShow = sec.items.slice();
  }

  if(activeFilter === 'high'){
    itemsToShow = itemsToShow.filter(it=>it.p==='h');
  }

  kickerEl.textContent = kicker;
  sectionTitleEl.textContent = title;
  sectionSubEl.textContent = sub;

  if(itemsToShow.length === 0){
    noResultsEl.style.display = 'block';
  } else {
    noResultsEl.style.display = 'none';
    gridEl.innerHTML = itemsToShow.map(cardHTML).join('');
  }
}

searchInput.addEventListener('input', (e)=>{
  query = e.target.value;
  render();
});

filterToggle.addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  activeFilter = btn.dataset.filter;
  [...filterToggle.querySelectorAll('button')].forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

buildSidebar();
render();
</script>
