<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Repository</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #eff6ff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .subject-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            max-height: 500px;
        }

        .subject-card h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic-count {
            font-size: 0.85rem;
            background: var(--bg-color);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .links-container {
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .links-container::-webkit-scrollbar { width: 6px; }
        .links-container::-webkit-scrollbar-track { background: transparent; }
        .links-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .topic-link {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.95rem;
            padding: 10px 12px;
            border-radius: 6px;
            background-color: var(--bg-color);
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
        }

        .topic-link::before {
            content: "📄";
            font-size: 0.8rem;
            margin-right: 8px;
            opacity: 0.7;
        }

        .topic-link:hover {
            background-color: var(--accent-hover);
            color: var(--accent);
            border-color: #bfdbfe;
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <header>
        <h1>Knowledge Repository</h1>
        <p class="subtitle">Select a topic to view your study notes</p>
    </header>

    <main class="grid-container" id="repository-grid"></main>

    <script>
        // Standardized subject configurations and exact topic counts
        const subjects = [
            { id: 'physics', displayName: 'PHYSICS', count: 7 },
            { id: 'chemistry', displayName: 'CHEMISTRY', count: 7 },
            { id: 'biology', displayName: 'BIOLOGY', count: 13 },
            { id: 'economics', displayName: 'ECONOMICS', count: 10 },
            { id: 'polity', displayName: 'POLITY', count: 15 },
            { id: 'history', displayName: 'HISTORY', count: 23 },
            { id: 'geography', displayName: 'GEOGRAPHY', count: 17 },
            { id: 'static', displayName: 'STATIC', count: 5 },
            { id: 'math', displayName: 'Math', count: 1 }
        ];

        const grid = document.getElementById('repository-grid');

        subjects.forEach(subject => {
            const card = document.createElement('div');
            card.className = 'subject-card';

            const header = document.createElement('h2');
            header.innerHTML = `${subject.displayName} <span class="topic-count">${subject.count} Chapters</span>`;
            card.appendChild(header);

            const linksContainer = document.createElement('div');
            linksContainer.className = 'links-container';

            // Dynamically generate standard links: e.g., physics_ch1.html
            for (let i = 1; i <= subject.count; i++) {
                const link = document.createElement('a');
                link.className = 'topic-link';
                
                link.href = `${subject.id}_ch${i}.html`;
                link.textContent = `${subject.displayName} - Chapter ${i}`;
                
                linksContainer.appendChild(link);
            }

            card.appendChild(linksContainer);
            grid.appendChild(card);
        });
    </script>
</body>
</html>
