<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Repository</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #eff6ff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .subject-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            max-height: 500px;
        }

        .subject-card h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic-count {
            font-size: 0.85rem;
            background: var(--bg-color);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .links-container {
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Custom Scrollbar for inner card scrolling */
        .links-container::-webkit-scrollbar {
            width: 6px;
        }
        .links-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .links-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .links-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .topic-link {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.95rem;
            padding: 10px 12px;
            border-radius: 6px;
            background-color: var(--bg-color);
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
        }

        .topic-link::before {
            content: "📄";
            font-size: 0.8rem;
            margin-right: 8px;
            opacity: 0.7;
        }

        .topic-link:hover {
            background-color: var(--accent-hover);
            color: var(--accent);
            border-color: #bfdbfe;
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <header>
        <h1>Knowledge Repository</h1>
        <p class="subtitle">Select a topic to view the notes</p>
    </header>

    <main class="grid-container" id="repository-grid">
        </main>

    <script>
        // 1. Configure your subjects and topic counts here
        const subjects = [
            { name: 'PHYSICS', count: 10 },
            { name: 'POLITY', count: 15 },
            { name: 'BIOLOGY', count: 16 },
            { name: 'HISTORY', count: 23 },
            { name: 'GEOGRAPHY', count: 18 },
            { name: 'CHEMISTRY', count: 7 },
            { name: 'STATIC', count: 7 },
            { name: 'ECONOMICS', count: 11 }
        ];

        const grid = document.getElementById('repository-grid');

        // 2. Automatically generate the cards and links
        subjects.forEach(subject => {
            // Create Card Container
            const card = document.createElement('div');
            card.className = 'subject-card';

            // Create Card Header
            const header = document.createElement('h2');
            header.innerHTML = `${subject.name} <span class="topic-count">${subject.count} Topics</span>`;
            card.appendChild(header);

            // Create Links Container
            const linksContainer = document.createElement('div');
            linksContainer.className = 'links-container';

            // Generate Links
            for (let i = 1; i <= subject.count; i++) {
                const link = document.createElement('a');
                link.className = 'topic-link';
                
                // Set the link target (e.g., "PHYSICS/topic-1.html")
                // Adjust this logic if you prefer a different folder or naming structure
                link.href = `${subject.name}/topic-${i}.html`; 
                link.textContent = `Topic ${i}`;
                
                linksContainer.appendChild(link);
            }

            card.appendChild(linksContainer);
            grid.appendChild(card);
        });
    </script>

</body>
</html>
