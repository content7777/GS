<title>December Current Affairs — SSC CGL Study Tool</title>
<style>
  :root{
    --bg: #14181f;
    --bg-alt: #1a1f28;
    --card: #1d232d;
    --card-border: #2a313d;
    --text-main: #e3e7ee;
    --text-dim: #9aa5b3;
    --accent: #7fa8c9;
    --accent-soft: #5b7d99;
    --high: #d9a66c;
    --high-bg: rgba(217,166,108,0.12);
    --high-border: rgba(217,166,108,0.45);
    --scroll: #333c48;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background: radial-gradient(circle at top left, #171c24, #12151b 70%);
    color: var(--text-main);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display:flex;
    min-height:100vh;
    overflow:hidden;
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:4px;}

  /* Sidebar */
  #sidebar{
    width:250px;
    min-width:250px;
    background: var(--bg-alt);
    border-right:1px solid var(--card-border);
    display:flex;
    flex-direction:column;
    padding:22px 14px;
    overflow-y:auto;
  }
  #sidebar h1{
    font-size:16px;
    font-weight:600;
    color: var(--accent);
    letter-spacing:0.3px;
    margin: 4px 8px 22px 8px;
    line-height:1.4;
  }
  #sidebar h1 span{display:block;font-size:12px;color:var(--text-dim);font-weight:400;margin-top:4px;}
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 12px;
    border-radius:10px;
    color: var(--text-dim);
    cursor:pointer;
    font-size:14px;
    margin-bottom:4px;
    transition: background 0.2s ease, color 0.2s ease;
    user-select:none;
  }
  .nav-item:hover{ background: #232a35; color: var(--text-main); }
  .nav-item.active{
    background: linear-gradient(90deg, rgba(127,168,201,0.18), rgba(127,168,201,0.03));
    color: var(--accent);
    border-left: 3px solid var(--accent);
    padding-left:9px;
    font-weight:600;
  }
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .nav-count{
    margin-left:auto;
    font-size:10.5px;
    color: var(--text-dim);
    background: #262d38;
    padding:1px 7px;
    border-radius:8px;
  }

  #sidebar-footer{
    margin-top:auto;
    padding:10px;
    font-size:11px;
    color:#5a6373;
    text-align:center;
    border-top:1px solid var(--card-border);
    padding-top:14px;
  }

  /* Main */
  #main{
    flex:1;
    overflow-y:auto;
    padding: 34px 46px 60px 46px;
  }
  .page{ display:none; animation: fadeIn 0.35s ease; }
  .page.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .page-header{
    margin-bottom: 26px;
    padding-bottom:16px;
    border-bottom:1px solid var(--card-border);
  }
  .page-header h2{
    margin:0 0 6px 0;
    font-size: 24px;
    color: var(--text-main);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .page-header p{
    margin:0;
    color: var(--text-dim);
    font-size: 13.5px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap:18px;
  }

  .card{
    background: var(--card);
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:18px 20px;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover{ transform: translateY(-2px); border-color:#3a4451; }
  .card.high{
    border-color: var(--high-border);
    background: linear-gradient(180deg, var(--high-bg), var(--card) 55%);
  }
  .card-title{
    font-size:15.5px;
    font-weight:600;
    color: var(--text-main);
    margin:0 0 10px 0;
    line-height:1.4;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:20px;
    margin-bottom:10px;
    letter-spacing:0.3px;
  }
  .badge.high{
    background: rgba(217,166,108,0.18);
    color: var(--high);
    border:1px solid var(--high-border);
  }
  .card ul{
    margin:0;
    padding-left:18px;
    color: var(--text-dim);
    font-size:13.5px;
    line-height:1.65;
  }
  .card ul li{ margin-bottom:5px; }
  .card ul li b, .card ul li strong{ color: var(--text-main); font-weight:600; }

  .section-sub{
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    color: var(--accent-soft);
    margin: 30px 0 12px 2px;
    font-weight:700;
  }
  .section-sub:first-of-type{ margin-top:0; }

  #search-wrap{
    margin: 0 0 24px 0;
  }
  #search{
    width:100%;
    max-width:420px;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid var(--card-border);
    background: var(--bg-alt);
    color: var(--text-main);
    font-size:13.5px;
    outline:none;
  }
  #search:focus{ border-color: var(--accent-soft); }
  #search::placeholder{ color:#5a6373; }

  .hide{ display:none !important; }

  @media (max-width: 900px){
    body{flex-direction:column; overflow:auto;}
    #sidebar{width:100%; min-width:0; flex-direction:row; flex-wrap:wrap; overflow-x:auto;}
    #sidebar h1{display:none;}
    #main{padding:22px;}
    #sidebar-footer{display:none;}
  }
</style>
</head>

// ---------- Render ----------
const navList = document.getElementById('nav-list');
const pagesEl = document.getElementById('pages');

DATA.forEach((sec, idx) => {
  // nav item
  const nav = document.createElement('div');
  nav.className = 'nav-item' + (idx===0 ? ' active' : '');
  nav.dataset.key = sec.key;
  nav.innerHTML = `<span class="nav-icon">${sec.icon}</span><span>${sec.title}</span><span class="nav-count">${sec.items.length}</span>`;
  nav.addEventListener('click', () => showPage(sec.key));
  navList.appendChild(nav);

  // page
  const page = document.createElement('div');
  page.className = 'page' + (idx===0 ? ' active' : '');
  page.id = 'page-' + sec.key;

  let cardsHtml = '';
  sec.items.forEach(item => {
    const highClass = item.high ? ' high' : '';
    const badge = item.high ? `<span class="badge high">🔥 High Priority</span>` : '';
    const bullets = item.points.map(p => `<li>${p}</li>`).join('');
    cardsHtml += `
      <div class="card${highClass}" data-search="${(item.t + ' ' + item.points.join(' ')).toLowerCase().replace(/"/g,'')}">
        ${badge}
        <p class="card-title">${item.t}</p>
        <ul>${bullets}</ul>
      </div>`;
  });

  page.innerHTML = `
    <div class="page-header">
      <h2>${sec.icon} ${sec.title}</h2>
      <p>${sec.desc}</p>
    </div>
    <div class="grid">${cardsHtml}</div>
  `;
  pagesEl.appendChild(page);
});

function showPage(key){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + key).classList.add('active');
  document.querySelector(`.nav-item[data-key="${key}"]`).classList.add('active');
  document.getElementById('main').scrollTop = 0;
  document.getElementById('search').value = '';
  document.querySelectorAll('.card').forEach(c => c.classList.remove('hide'));
}

// Search across all pages (searches within current active page's cards; if typed, shows all pages' matches by switching to a unified search mode)
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if(!q){
    document.querySelectorAll('.card').forEach(c => c.classList.remove('hide'));
    return;
  }
  // reveal all pages when searching, filter cards
  document.querySelectorAll('.page').forEach(p => p.classList.add('active'));
  document.querySelectorAll('.page').forEach(p => {
    let anyVisible = false;
    p.querySelectorAll('.card').forEach(c => {
      const match = c.dataset.search.includes(q);
      c.classList.toggle('hide', !match);
      if(match) anyVisible = true;
    });
    p.style.display = anyVisible ? '' : 'none';
  });
});
searchInput.addEventListener('blur', () => {
  if(!searchInput.value.trim()){
    document.querySelectorAll('.page').forEach(p => p.style.display = '');
    const activeKey = document.querySelector('.nav-item.active').dataset.key;
    showPage(activeKey);
  }
});
